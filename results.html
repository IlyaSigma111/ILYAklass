<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИЛЬЯКЛАСС - Результаты</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        /* Дополнительные стили для страницы результатов */
        .results-container {
            background: white;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border: 2px solid #4CAF50;
        }

        .results-filters {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-select {
            padding: 12px 25px;
            border-radius: 30px;
            border: 2px solid #e0e0e0;
            background: white;
            color: #333;
            font-size: 16px;
            min-width: 200px;
        }

        .filter-select:focus {
            border-color: #4CAF50;
            outline: none;
        }

        .results-table {
            width: 100%;
            border-collapse: collapse;
        }

        .results-table th {
            background: #4CAF50;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }

        .results-table th:first-child {
            border-radius: 15px 0 0 15px;
        }

        .results-table th:last-child {
            border-radius: 0 15px 15px 0;
        }

        .results-table td {
            padding: 15px;
            border-bottom: 2px solid #e0e0e0;
        }

        .results-table tr:hover {
            background: #f5f5f5;
        }

        .score-cell {
            font-weight: 700;
            color: #4CAF50;
        }

        .student-name {
            font-weight: 600;
            color: #333;
        }

        .quiz-title {
            color: #2196F3;
        }

        .date-cell {
            color: #666;
            font-size: 14px;
        }

        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #f5f5f5;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: #4CAF50;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #666;
            font-size: 14px;
        }

        .export-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .export-btn:hover {
            background: #45a049;
        }

        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            padding: 12px 30px;
            border-radius: 30px;
            border: 2px solid #e0e0e0;
            background: white;
            cursor: pointer;
            font-weight: 600;
        }

        .tab-btn.active {
            background: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }
    </style>
</head>
<body>
    <header class="header">
        <div style="display: flex; align-items: center; gap: 30px;">
            <div class="logo" onclick="window.location='index.html'">
                <span class="logo-il">ИЛЬ</span>
                <span class="logo-yaclass">ЯКЛАСС</span>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link">Викторины</a>
                <a href="results.html" class="nav-link active">Результаты</a>
                <a href="profile.html" class="nav-link">Профиль</a>
            </nav>
        </div>
        <div id="userSection"></div>
    </header>

    <main class="main-container">
        <div id="content" class="loading">Загрузка результатов...</div>
    </main>

    <script>
        // Firebase конфиг
        const firebaseConfig = {
            apiKey: "AIzaSyA-FGoB1L-euPEfGZvTN0pyfyLGZY4zGyE",
            authDomain: "ilyaklass-b11c0.firebaseapp.com",
            projectId: "ilyaklass-b11c0",
            storageBucket: "ilyaklass-b11c0.firebasestorage.app",
            messagingSenderId: "803990572684",
            appId: "1:803990572684:web:f10f6399a2c0c035e5b5a9",
            databaseURL: "https://ilyaklass-b11c0-default-rtdb.firebaseio.com/"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let currentUser = null;
        let userRole = null;
        let userFullName = null;
        let allResults = [];
        let allQuizzes = [];
        let allStudents = [];

        // Проверка авторизации
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                
                const userRef = db.ref('users/' + user.uid);
                const snapshot = await userRef.once('value');
                const userData = snapshot.val();
                
                if (userData) {
                    userRole = userData.role;
                    userFullName = userData.fullName || user.displayName;
                    updateUI();
                    loadResults();
                } else {
                    window.location.href = 'index.html';
                }
            } else {
                window.location.href = 'index.html';
            }
        });

        function updateUI() {
            const userSection = document.getElementById('userSection');
            if (!userSection) return;
            
            if (currentUser) {
                userSection.innerHTML = `
                    <div class="user-card">
                        <img src="${currentUser.photoURL}" class="avatar">
                        <span style="font-weight: 500;">${userFullName || currentUser.displayName}</span>
                        <span class="role-badge">${userRole === 'teacher' ? 'Учитель' : 'Ученик'}</span>
                        <button onclick="signOut()" class="logout-btn">Выйти</button>
                    </div>
                `;
            }
        }

        function signOut() {
            auth.signOut();
        }

        async function loadResults() {
            const content = document.getElementById('content');
            
            // Загружаем все результаты
            const resultsSnap = await db.ref('results').once('value');
            const quizzesSnap = await db.ref('quizzes').once('value');
            const usersSnap = await db.ref('users').once('value');
            
            const results = resultsSnap.val();
            const quizzes = quizzesSnap.val();
            const users = usersSnap.val();
            
            if (!results) {
                content.innerHTML = `
                    <div class="results-container">
                        <h2 style="color: #4CAF50; text-align: center;">📊 Результаты</h2>
                        <p style="text-align: center; color: #666; margin-top: 30px;">Пока нет результатов</p>
                    </div>
                `;
                return;
            }

            // Преобразуем в массивы
            allResults = Object.entries(results).map(([id, data]) => ({ id, ...data }));
            allQuizzes = quizzes ? Object.entries(quizzes).map(([id, data]) => ({ id, ...data })) : [];
            allStudents = users ? Object.entries(users).map(([id, data]) => ({ id, ...data })) : [];

            // Сортируем по дате (новые сверху)
            allResults.sort((a, b) => (b.date || 0) - (a.date || 0));

            if (userRole === 'teacher') {
                // Для учителя показываем все результаты
                renderTeacherResults();
            } else {
                // Для ученика показываем только его результаты
                renderStudentResults();
            }
        }

        function renderTeacherResults() {
            const content = document.getElementById('content');
            
            // Статистика
            const totalQuizzes = new Set(allResults.map(r => r.quizTitle)).size;
            const totalStudents = new Set(allResults.map(r => r.studentId)).size;
            const avgScore = (allResults.reduce((sum, r) => sum + (r.score || 0), 0) / allResults.length).toFixed(1);
            
            // Уникальные предметы и викторины для фильтров
            const subjects = [...new Set(allResults.map(r => r.quizSubject).filter(Boolean))];
            const quizTitles = [...new Set(allResults.map(r => r.quizTitle).filter(Boolean))];
            
            content.innerHTML = `
                <div class="results-container">
                    <h2 style="color: #4CAF50; margin-bottom: 30px;">📊 Все результаты</h2>
                    
                    <div class="stats-cards">
                        <div class="stat-card">
                            <div class="stat-value">${allResults.length}</div>
                            <div class="stat-label">Всего результатов</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${totalQuizzes}</div>
                            <div class="stat-label">Проведено викторин</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${totalStudents}</div>
                            <div class="stat-label">Учеников</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${avgScore}</div>
                            <div class="stat-label">Средний балл</div>
                        </div>
                    </div>
                    
                    <button class="export-btn" onclick="exportResults()">📥 Экспорт в CSV</button>
                    
                    <div class="results-filters">
                        <select class="filter-select" id="subjectFilter" onchange="filterResults()">
                            <option value="all">Все предметы</option>
                            ${subjects.map(s => `<option value="${s}">${s}</option>`).join('')}
                        </select>
                        
                        <select class="filter-select" id="quizFilter" onchange="filterResults()">
                            <option value="all">Все викторины</option>
                            ${quizTitles.map(q => `<option value="${q}">${q}</option>`).join('')}
                        </select>
                        
                        <select class="filter-select" id="studentFilter" onchange="filterResults()">
                            <option value="all">Все ученики</option>
                            ${allStudents.map(s => `<option value="${s.id}">${s.fullName || s.googleName}</option>`).join('')}
                        </select>
                    </div>
                    
                    <div style="overflow-x: auto;">
                        <table class="results-table" id="resultsTable">
                            <thead>
                                <tr>
                                    <th>Ученик</th>
                                    <th>Предмет</th>
                                    <th>Викторина</th>
                                    <th>Баллы</th>
                                    <th>Дата</th>
                                </tr>
                            </thead>
                            <tbody id="resultsBody">
                                ${renderResultsRows(allResults)}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function renderStudentResults() {
            const content = document.getElementById('content');
            
            // Фильтруем результаты текущего ученика
            const myResults = allResults.filter(r => r.studentId === currentUser.uid);
            
            // Статистика
            const totalScore = myResults.reduce((sum, r) => sum + (r.score || 0), 0);
            const avgScore = (totalScore / myResults.length).toFixed(1);
            
            content.innerHTML = `
                <div class="results-container">
                    <h2 style="color: #4CAF50; margin-bottom: 30px;">📊 Мои результаты</h2>
                    
                    <div class="stats-cards">
                        <div class="stat-card">
                            <div class="stat-value">${myResults.length}</div>
                            <div class="stat-label">Пройдено викторин</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${totalScore}</div>
                            <div class="stat-label">Всего баллов</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${avgScore}</div>
                            <div class="stat-label">Средний балл</div>
                        </div>
                    </div>
                    
                    <div style="overflow-x: auto;">
                        <table class="results-table">
                            <thead>
                                <tr>
                                    <th>Предмет</th>
                                    <th>Викторина</th>
                                    <th>Баллы</th>
                                    <th>Дата</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${myResults.map(r => `
                                    <tr>
                                        <td class="quiz-title">${r.quizSubject || 'Без предмета'}</td>
                                        <td class="student-name">${r.quizTitle || 'Без названия'}</td>
                                        <td class="score-cell">${r.score || 0}/${r.maxScore || 0}</td>
                                        <td class="date-cell">${r.date ? new Date(r.date).toLocaleString() : 'Дата неизвестна'}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                    
                    ${myResults.length === 0 ? '<p style="text-align: center; color: #666; margin-top: 30px;">У вас пока нет результатов</p>' : ''}
                </div>
            `;
        }

        function renderResultsRows(results) {
            return results.map(r => {
                const student = allStudents.find(s => s.id === r.studentId);
                const studentName = student ? (student.fullName || student.googleName) : 'Неизвестный ученик';
                
                return `
                    <tr>
                        <td class="student-name">${studentName}</td>
                        <td class="quiz-title">${r.quizSubject || 'Без предмета'}</td>
                        <td>${r.quizTitle || 'Без названия'}</td>
                        <td class="score-cell">${r.score || 0}/${r.maxScore || 0}</td>
                        <td class="date-cell">${r.date ? new Date(r.date).toLocaleString() : 'Дата неизвестна'}</td>
                    </tr>
                `;
            }).join('');
        }

        function filterResults() {
            const subjectFilter = document.getElementById('subjectFilter').value;
            const quizFilter = document.getElementById('quizFilter').value;
            const studentFilter = document.getElementById('studentFilter').value;
            
            let filtered = [...allResults];
            
            if (subjectFilter !== 'all') {
                filtered = filtered.filter(r => r.quizSubject === subjectFilter);
            }
            
            if (quizFilter !== 'all') {
                filtered = filtered.filter(r => r.quizTitle === quizFilter);
            }
            
            if (studentFilter !== 'all') {
                filtered = filtered.filter(r => r.studentId === studentFilter);
            }
            
            document.getElementById('resultsBody').innerHTML = renderResultsRows(filtered);
        }

        function exportResults() {
            // Создаем CSV
            const headers = ['Ученик', 'Предмет', 'Викторина', 'Баллы', 'Макс. балл', 'Дата'];
            const rows = allResults.map(r => {
                const student = allStudents.find(s => s.id === r.studentId);
                const studentName = student ? (student.fullName || student.googleName) : 'Неизвестный ученик';
                
                return [
                    studentName,
                    r.quizSubject || 'Без предмета',
                    r.quizTitle || 'Без названия',
                    r.score || 0,
                    r.maxScore || 0,
                    r.date ? new Date(r.date).toLocaleString() : 'Дата неизвестна'
                ];
            });
            
            const csvContent = [
                headers.join(','),
                ...rows.map(row => row.map(cell => `"${cell}"`).join(','))
            ].join('\n');
            
            // Скачиваем файл
            const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.href = url;
            link.setAttribute('download', 'results.csv');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        // Добавляем функцию для обновления в реальном времени
        db.ref('results').on('child_added', () => {
            if (currentUser) {
                loadResults();
            }
        });
    </script>
</body>
</html>
