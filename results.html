<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИЛЬЯКЛАСС - Результаты</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body {
            background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            min-height: 100vh;
        }
        body.light-theme {
            background: linear-gradient(145deg, #667eea 0%, #764ba2 100%);
            color: #1a1a2e;
        }
        .header {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255,215,0,0.3);
            padding: 12px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { font-size: 32px; font-weight: 900; cursor: pointer; }
        .logo-il { color: #ffd700; }
        .logo-yaclass { color: #00ffff; }
        .nav-menu { display: flex; gap: 10px; }
        .nav-link {
            padding: 8px 20px;
            border-radius: 40px;
            background: rgba(255,255,255,0.15);
            color: white;
            text-decoration: none;
        }
        .nav-link.active { background: rgba(255,215,0,0.3); }
        .main-container { max-width: 1400px; margin: 25px auto; padding: 0 20px; }
        .results-container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 30px;
            padding: 30px;
        }
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
            margin: 25px 0;
        }
        .stat-card {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
        }
        .stat-value { font-size: 32px; font-weight: 700; color: #ffd700; }
        .results-table {
            width: 100%;
            border-collapse: collapse;
        }
        .results-table th {
            background: rgba(255,215,0,0.2);
            padding: 15px;
            text-align: left;
            color: white;
        }
        .results-table td {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255,215,0,0.2);
            color: white;
        }
    </style>
</head>
<body class="dark-theme">
    <header class="header">
        <div class="header-left">
            <div class="logo" onclick="window.location='index.html'">
                <span class="logo-il">ИЛЬ</span>
                <span class="logo-yaclass">ЯКЛАСС</span>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link">Викторины</a>
                <a href="results.html" class="nav-link active">Результаты</a>
                <a href="profile.html" class="nav-link">Профиль</a>
            </nav>
        </div>
        <div class="header-right">
            <button class="theme-btn" onclick="toggleTheme()" id="themeToggle">☀️ Светлая</button>
            <div id="userSection"></div>
        </div>
    </header>

    <main class="main-container">
        <div id="content" class="loading">Загрузка результатов...</div>
    </main>

    <script src="firebase.js"></script>
    <script src="auth.js"></script>
    <script>
        function toggleTheme() {
            const body = document.body;
            const themeBtn = document.getElementById('themeToggle');
            if (body.classList.contains('dark-theme')) {
                body.classList.remove('dark-theme');
                body.classList.add('light-theme');
                themeBtn.textContent = '🌙 Темная';
                localStorage.setItem('theme', 'light');
            } else {
                body.classList.remove('light-theme');
                body.classList.add('dark-theme');
                themeBtn.textContent = '☀️ Светлая';
                localStorage.setItem('theme', 'dark');
            }
        }

        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.body.className = savedTheme + '-theme';
        document.getElementById('themeToggle').textContent = savedTheme === 'dark' ? '☀️ Светлая' : '🌙 Темная';

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                const simpleUser = getCurrentSimpleUser();
                
                if (simpleUser) {
                    userRole = simpleUser.role;
                    userFullName = simpleUser.fullName || simpleUser.username;
                    userIsModerator = simpleUser.isModerator || false;
                    document.getElementById('userSection').innerHTML = `
                        <div class="user-card">
                            <img src="${DEFAULT_AVATAR}" class="avatar">
                            <span>${userFullName}</span>
                            <button onclick="signOut()" class="logout-btn">Выйти</button>
                        </div>
                    `;
                } else {
                    const userData = (await db.ref('users/' + user.uid).once('value')).val();
                    if (userData) {
                        userRole = userData.role;
                        userFullName = userData.fullName || user.displayName;
                        userIsModerator = userData.isModerator || false;
                    }
                    document.getElementById('userSection').innerHTML = `
                        <div class="user-card">
                            <img src="${user.photoURL || DEFAULT_AVATAR}" class="avatar">
                            <span>${userFullName || user.displayName}</span>
                            <button onclick="signOut()" class="logout-btn">Выйти</button>
                        </div>
                    `;
                }
                
                loadResults();
            } else {
                window.location.href = 'index.html';
            }
        });

        function signOut() {
            if (getCurrentSimpleUser()) {
                localStorage.removeItem('currentSimpleUser');
            } else {
                auth.signOut();
            }
            window.location.href = 'index.html';
        }

        async function loadResults() {
            const results = (await db.ref('results').once('value')).val();
            if (!results) {
                document.getElementById('content').innerHTML = '<div class="results-container"><h2 style="color:#ffd700;">Нет результатов</h2></div>';
                return;
            }
            
            const resultsArray = Object.values(results);
            document.getElementById('content').innerHTML = `
                <div class="results-container">
                    <h2 style="color:#ffd700;">Всего результатов: ${resultsArray.length}</h2>
                </div>
            `;
        }
    </script>
</body>
</html>
