<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИЛЬЯКЛАСС - Профиль</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <div class="logo" onclick="window.location='index.html'">
                <span class="logo-il">ИЛЬ</span>
                <span class="logo-yaclass">ЯКЛАСС</span>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link">Викторины</a>
                <a href="results.html" class="nav-link">Результаты</a>
                <a href="profile.html" class="nav-link active">Профиль</a>
            </nav>
        </div>
        <div class="header-right">
            <button class="theme-btn" onclick="toggleTheme()" id="themeToggle">🌙 Темная</button>
            <div id="userSection"></div>
        </div>
    </header>

    <main class="main-container">
        <div id="content" class="loading">Загрузка профиля...</div>
    </main>

    <script src="firebase.js"></script>
    <script>
        // Переключение темы
        function toggleTheme() {
            const body = document.body;
            const themeBtn = document.getElementById('themeToggle');
            
            if (body.classList.contains('light-theme')) {
                body.classList.remove('light-theme');
                body.classList.add('dark-theme');
                themeBtn.textContent = '☀️ Светлая';
                localStorage.setItem('theme', 'dark');
            } else {
                body.classList.remove('dark-theme');
                body.classList.add('light-theme');
                themeBtn.textContent = '🌙 Темная';
                localStorage.setItem('theme', 'light');
            }
        }

        // Загружаем сохраненную тему
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.remove('light-theme');
            document.body.classList.add('dark-theme');
            document.getElementById('themeToggle').textContent = '☀️ Светлая';
        }

        let currentUser = null;
        let userRole = null;
        let userFullName = null;
        let userIsModerator = false;
        let teacherSubjects = [];
        let profileSubjects = [];
        
        const DEVELOPER_EMAIL = 'ilyagulkov25@gmail.com';
        const defaultSubjects = [
            'Русский язык', 'Алгебра', 'Геометрия', 'Математика', 
            'Химия', 'Физика', 'Литература', 'Английский язык', 
            'История', 'Физкультура'
        ];
        
        function cleanDisplayName(name) {
            if (!name) return name;
            return name.replace(/\s*\(\d+\)$/, '');
        }
        
        async function loadProfileSubjects() {
            try {
                const subjectsSnap = await db.ref('subjects').once('value');
                const subjects = subjectsSnap.val();
                if (subjects) {
                    profileSubjects = Object.values(subjects);
                } else {
                    profileSubjects = [...defaultSubjects];
                }
            } catch (error) {
                console.error('Ошибка загрузки предметов:', error);
                profileSubjects = [...defaultSubjects];
            }
        }
        
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                
                try {
                    await loadProfileSubjects();
                    
                    const userRef = db.ref('users/' + user.uid);
                    const snapshot = await userRef.once('value');
                    const userData = snapshot.val();
                    
                    if (userData) {
                        userRole = userData.role;
                        userFullName = userData.fullName || user.displayName;
                        userIsModerator = userData.isModerator || false;
                        
                        const isDeveloper = user.email === DEVELOPER_EMAIL;
                        
                        let roleText = '';
                        let roleClass = '';
                        
                        if (isDeveloper) {
                            roleText = '👑 Разработчик';
                            roleClass = 'developer';
                        } else if (userIsModerator) {
                            roleText = '🛡️ Модератор';
                            roleClass = 'moderator';
                        } else {
                            roleText = userRole === 'teacher' ? '👨‍🏫 Учитель' : '👨‍🎓 Ученик';
                            roleClass = userRole === 'teacher' ? 'teacher' : 'student';
                        }
                        
                        document.getElementById('userSection').innerHTML = `
                            <div class="user-card">
                                <img src="${user.photoURL}" class="avatar">
                                <div class="user-info">
                                    <span class="user-name">${cleanDisplayName(userFullName)}</span>
                                    <span class="user-role ${roleClass}">${roleText}</span>
                                </div>
                                <button onclick="signOut()" class="logout-btn">Выйти</button>
                            </div>
                        `;
                        
                        if (userRole === 'teacher' && userData.subjects) {
                            teacherSubjects = userData.subjects;
                        }
                        
                        loadProfileContent(user, userData);
                    } else {
                        window.location.href = 'index.html';
                    }
                } catch (error) {
                    console.error('Ошибка:', error);
                }
            } else {
                window.location.href = 'index.html';
            }
        });

        function signOut() {
            auth.signOut();
            window.location.href = 'index.html';
        }
        
        function loadProfileContent(user, userData) {
            const content = document.getElementById('content');
            
            const isDeveloper = user.email === DEVELOPER_EMAIL;
            
            let roleText = '';
            let roleClass = '';
            
            if (isDeveloper) {
                roleText = '👑 Разработчик';
                roleClass = 'developer';
            } else if (userIsModerator) {
                roleText = '🛡️ Модератор';
                roleClass = 'moderator';
            } else {
                roleText = userRole === 'teacher' ? '👨‍🏫 Учитель' : '👨‍🎓 Ученик';
                roleClass = userRole === 'teacher' ? 'teacher' : 'student';
            }
            
            const showAllSubjects = localStorage.getItem('showAllSubjects') === 'true';
            
            content.innerHTML = `
                <div class="profile-container">
                    <div class="profile-sidebar">
                        <img src="${user.photoURL}" class="profile-avatar">
                        <div class="profile-name">${cleanDisplayName(userFullName)}</div>
                        <div class="profile-email">${user.email}</div>
                        <div class="profile-role ${roleClass}">${roleText}</div>
                        
                        ${userRole === 'teacher' || isDeveloper || userIsModerator ? `
                            <div style="margin-top: 30px;">
                                <h3 style="color: #ffd700; margin-bottom: 15px;">➕ Управление</h3>
                                <button class="add-quiz-btn" onclick="window.location.href='index.html#addQuiz'" style="width: 100%;">➕ Добавить викторину</button>
                            </div>
                        ` : ''}
                    </div>
                    
                    <div class="profile-main">
                        <h2 class="settings-title">⚙️ Настройки профиля</h2>
                        
                        <div class="settings-section">
                            <div class="setting-item">
                                <div>
                                    <div class="setting-label">Фамилия и Имя</div>
                                    <div class="setting-description">Как вас видят другие пользователи</div>
                                </div>
                                <input type="text" id="fullNameInput" class="setting-input" value="${cleanDisplayName(userFullName)}" placeholder="Иванов Иван">
                            </div>
                            
                            <button class="submit-quiz" onclick="saveFullName()" style="margin-top: 20px;">💾 Сохранить имя</button>
                        </div>
                        
                        <div class="settings-section">
                            <div class="setting-item">
                                <div>
                                    <div class="setting-label">Режим "Все предметы"</div>
                                    <div class="setting-description">Показывать все предметы на главной</div>
                                </div>
                                <label class="subject-checkbox">
                                    <input type="checkbox" id="showAllSubjects" ${showAllSubjects ? 'checked' : ''} onchange="toggleAllSubjects()">
                                    Включить
                                </label>
                            </div>
                        </div>
                        
                        ${userRole === 'teacher' ? `
                            <div class="settings-section">
                                <h3 style="color: #ffd700; margin-bottom: 20px;">📚 Мои предметы</h3>
                                <div id="subjectsList" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px;"></div>
                                
                                <div style="display: flex; gap: 15px; margin-bottom: 30px;">
                                    <input type="text" id="newSubjectInput" placeholder="Новый предмет" class="setting-input" style="flex: 1;">
                                    <button onclick="addNewSubject()" class="add-quiz-btn">➕ Добавить</button>
                                </div>
                                
                                <button class="submit-quiz" onclick="saveTeacherSubjects()">💾 Сохранить предметы</button>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
            
            if (userRole === 'teacher') {
                renderSubjectCheckboxes();
            }
        }
        
        function renderSubjectCheckboxes() {
            const container = document.getElementById('subjectsList');
            if (!container) return;
            
            let html = '';
            profileSubjects.forEach(subject => {
                html += `
                    <label class="subject-checkbox">
                        <input type="checkbox" value="${subject}" ${teacherSubjects.includes(subject) ? 'checked' : ''}>
                        ${subject}
                    </label>
                `;
            });
            container.innerHTML = html;
        }
        
        async function addNewSubject() {
            const newSubject = document.getElementById('newSubjectInput').value.trim();
            if (!newSubject) {
                alert('Введите название предмета');
                return;
            }
            
            const formattedSubject = newSubject.charAt(0).toUpperCase() + newSubject.slice(1);
            
            if (profileSubjects.includes(formattedSubject)) {
                alert('Такой предмет уже существует');
                return;
            }
            
            try {
                await db.ref('subjects').push(formattedSubject);
                profileSubjects.push(formattedSubject);
                renderSubjectCheckboxes();
                document.getElementById('newSubjectInput').value = '';
                alert('Предмет добавлен!');
            } catch (error) {
                console.error('Ошибка добавления предмета:', error);
                alert('Ошибка при добавлении предмета');
            }
        }
        
        async function saveFullName() {
            const newName = document.getElementById('fullNameInput').value;
            if (!newName) {
                alert('Введите имя');
                return;
            }
            
            try {
                await db.ref('users/' + currentUser.uid).update({
                    fullName: newName
                });
                
                alert('Имя сохранено!');
                window.location.reload();
            } catch (error) {
                console.error('Ошибка сохранения имени:', error);
                alert('Ошибка при сохранении имени');
            }
        }
        
        async function saveTeacherSubjects() {
            const checkboxes = document.querySelectorAll('#subjectsList input[type="checkbox"]:checked');
            const subjects = Array.from(checkboxes).map(cb => cb.value);
            
            try {
                await db.ref('users/' + currentUser.uid).update({
                    subjects: subjects
                });
                
                alert('Предметы сохранены!');
            } catch (error) {
                console.error('Ошибка сохранения предметов:', error);
                alert('Ошибка при сохранении предметов');
            }
        }
        
        function toggleAllSubjects() {
            const checked = document.getElementById('showAllSubjects').checked;
            localStorage.setItem('showAllSubjects', checked);
            alert('Настройка сохранена');
        }
    </script>
</body>
</html>
