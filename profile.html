<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИЛЬЯКЛАСС - Профиль</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        /* Дополнительные стили только для профиля */
        .profile-container {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 30px;
        }
        
        .profile-card {
            background: #1a2639;
            border: 3px solid gold;
            border-radius: 30px;
            padding: 30px;
            text-align: center;
        }
        
        .profile-avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid gold;
            margin-bottom: 20px;
        }
        
        .profile-name {
            font-size: 24px;
            color: gold;
            margin-bottom: 10px;
        }
        
        .profile-email {
            color: #aaa;
            margin-bottom: 20px;
        }
        
        .profile-role {
            background: gold;
            color: #0b1120;
            display: inline-block;
            padding: 8px 25px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 18px;
        }
        
        .settings-card {
            background: #1a2639;
            border: 3px solid gold;
            border-radius: 30px;
            padding: 30px;
        }
        
        .settings-title {
            color: gold;
            font-size: 28px;
            margin-bottom: 30px;
        }
        
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 2px solid #334155;
        }
        
        .setting-item:last-child {
            border-bottom: none;
        }
        
        .setting-label {
            font-size: 18px;
            font-weight: bold;
        }
        
        .setting-description {
            color: #aaa;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .setting-input {
            background: #0f172a;
            border: 2px solid gold;
            color: white;
            padding: 10px 15px;
            border-radius: 15px;
            width: 250px;
            font-size: 16px;
        }
        
        .setting-input:focus {
            outline: none;
            box-shadow: 0 0 10px gold;
        }
        
        .save-btn {
            background: gold;
            color: #0b1120;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
        
        .save-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px gold;
        }
        
        .toggle-switch {
            width: 60px;
            height: 30px;
            background: #334155;
            border-radius: 30px;
            position: relative;
            cursor: pointer;
        }
        
        .toggle-switch.active {
            background: gold;
        }
        
        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 26px;
            height: 26px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: 0.3s;
        }
        
        .toggle-switch.active::after {
            left: 32px;
        }
        
        @media (max-width: 768px) {
            .profile-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div style="display: flex; align-items: center; gap: 30px;">
            <div class="logo" onclick="window.location='index.html'">
                <span class="logo-il">ИЛЬ</span>
                <span class="logo-yaclass">ЯКЛАСС</span>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link">Викторины</a>
                <a href="results.html" class="nav-link">Результаты</a>
                <a href="profile.html" class="nav-link active">Профиль</a>
            </nav>
        </div>
        <div id="userSection"></div>
    </header>

    <main class="main-container">
        <div id="content" class="loading">Загрузка профиля...</div>
    </main>

    <script>
        // Твой Firebase конфиг
        const firebaseConfig = {
            apiKey: "AIzaSyA-FGoB1L-euPEfGZvTN0pyfyLGZY4zGyE",
            authDomain: "ilyaklass-b11c0.firebaseapp.com",
            projectId: "ilyaklass-b11c0",
            storageBucket: "ilyaklass-b11c0.firebasestorage.app",
            messagingSenderId: "803990572684",
            appId: "1:803990572684:web:f10f6399a2c0c035e5b5a9",
            databaseURL: "https://ilyaklass-b11c0-default-rtdb.firebaseio.com/"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const provider = new firebase.auth.GoogleAuthProvider();

        let currentUser = null;
        let userRole = null;
        let userFullName = null;
        let userSettings = {
            emailNotifications: true,
            classFilter: 'all',
            subjectFilter: 'all'
        };

        // Проверка авторизации
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                
                const userRef = db.ref('users/' + user.uid);
                const snapshot = await userRef.once('value');
                const userData = snapshot.val();
                
                if (userData) {
                    userRole = userData.role;
                    userFullName = userData.fullName;
                    userSettings = { ...userSettings, ...userData.settings };
                    
                    updateUI();
                    loadProfile();
                } else {
                    // Новый пользователь - отправляем на главную для выбора роли
                    window.location.href = 'index.html';
                }
            } else {
                // Не авторизован - показываем кнопку входа
                document.getElementById('userSection').innerHTML = '';
                document.getElementById('content').innerHTML = `
                    <div class="login-container">
                        <div class="login-card">
                            <div class="login-title">
                                <span class="logo-il">ИЛЬ</span>
                                <span class="logo-yaclass">ЯКЛАСС</span>
                            </div>
                            <div class="login-subtitle">Войдите, чтобы увидеть профиль</div>
                            <button class="login-big-btn" onclick="signIn()">
                                🔑 Войти через Google
                            </button>
                        </div>
                    </div>
                `;
            }
        });

        // Вход
        function signIn() {
            auth.signInWithPopup(provider);
        }

        // Выход
        function signOut() {
            auth.signOut();
            window.location.href = 'index.html';
        }

        // Обновление интерфейса
        function updateUI() {
            const userSection = document.getElementById('userSection');
            if (!userSection) return;
            
            if (currentUser) {
                userSection.innerHTML = `
                    <div class="user-card">
                        <img src="${currentUser.photoURL}" class="avatar">
                        <span>${userFullName || currentUser.displayName}</span>
                        <span class="role-badge">${userRole === 'teacher' ? 'Учитель' : 'Ученик'}</span>
                        <button onclick="signOut()" class="logout-btn">Выйти</button>
                    </div>
                `;
            }
        }

        // Загрузка профиля
        function loadProfile() {
            const content = document.getElementById('content');
            
            content.innerHTML = `
                <div class="profile-container">
                    <!-- Левая колонка - аватар и основная информация -->
                    <div class="profile-card">
                        <img src="${currentUser.photoURL}" class="profile-avatar">
                        <div class="profile-name">${userFullName || 'Имя не указано'}</div>
                        <div class="profile-email">${currentUser.email}</div>
                        <div class="profile-role">${userRole === 'teacher' ? '👨‍🏫 Учитель' : '👨‍🎓 Ученик'}</div>
                        
                        <div style="margin-top: 30px; text-align: left;">
                            <div style="color: gold; margin-bottom: 15px; font-size: 18px;">📊 Статистика</div>
                            <div style="display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #334155;">
                                <span>Всего викторин:</span>
                                <span style="color: gold; font-weight: bold;" id="totalQuizzes">0</span>
                            </div>
                            <div style="display: flex; justify-content: space-between; padding: 10px 0;">
                                <span>Средний балл:</span>
                                <span style="color: gold; font-weight: bold;" id="avgScore">-</span>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Правая колонка - настройки -->
                    <div class="settings-card">
                        <div class="settings-title">⚙️ Настройки профиля</div>
                        
                        <!-- ФИО -->
                        <div class="setting-item">
                            <div>
                                <div class="setting-label">Фамилия и Имя</div>
                                <div class="setting-description">Как вас видят другие пользователи</div>
                            </div>
                            <input type="text" id="fullNameInput" class="setting-input" value="${userFullName || ''}" placeholder="Иванов Иван">
                        </div>
                        
                        <!-- Фильтр класса по умолчанию -->
                        <div class="setting-item">
                            <div>
                                <div class="setting-label">Класс по умолчанию</div>
                                <div class="setting-description">Какой класс показывать при входе</div>
                            </div>
                            <select id="classFilter" class="setting-input">
                                <option value="all" ${userSettings.classFilter === 'all' ? 'selected' : ''}>Все классы</option>
                                <option value="5" ${userSettings.classFilter === '5' ? 'selected' : ''}>5 класс</option>
                                <option value="6" ${userSettings.classFilter === '6' ? 'selected' : ''}>6 класс</option>
                                <option value="7" ${userSettings.classFilter === '7' ? 'selected' : ''}>7 класс</option>
                                <option value="8" ${userSettings.classFilter === '8' ? 'selected' : ''}>8 класс</option>
                                <option value="9" ${userSettings.classFilter === '9' ? 'selected' : ''}>9 класс</option>
                                <option value="10" ${userSettings.classFilter === '10' ? 'selected' : ''}>10 класс</option>
                                <option value="11" ${userSettings.classFilter === '11' ? 'selected' : ''}>11 класс</option>
                            </select>
                        </div>
                        
                        <!-- Фильтр предмета по умолчанию -->
                        <div class="setting-item">
                            <div>
                                <div class="setting-label">Предмет по умолчанию</div>
                                <div class="setting-description">Какой предмет показывать при входе</div>
                            </div>
                            <select id="subjectFilter" class="setting-input">
                                <option value="all" ${userSettings.subjectFilter === 'all' ? 'selected' : ''}>Все предметы</option>
                                <option value="Английский язык" ${userSettings.subjectFilter === 'Английский язык' ? 'selected' : ''}>Английский язык</option>
                                <option value="Математика" ${userSettings.subjectFilter === 'Математика' ? 'selected' : ''}>Математика</option>
                                <option value="Русский язык" ${userSettings.subjectFilter === 'Русский язык' ? 'selected' : ''}>Русский язык</option>
                                <option value="История" ${userSettings.subjectFilter === 'История' ? 'selected' : ''}>История</option>
                                <option value="Физика" ${userSettings.subjectFilter === 'Физика' ? 'selected' : ''}>Физика</option>
                                <option value="Химия" ${userSettings.subjectFilter === 'Химия' ? 'selected' : ''}>Химия</option>
                                <option value="Биология" ${userSettings.subjectFilter === 'Биология' ? 'selected' : ''}>Биология</option>
                            </select>
                        </div>
                        
                        <!-- Email уведомления -->
                        <div class="setting-item">
                            <div>
                                <div class="setting-label">Email уведомления</div>
                                <div class="setting-description">Получать результаты на почту</div>
                            </div>
                            <div class="toggle-switch ${userSettings.emailNotifications ? 'active' : ''}" 
                                 onclick="toggleSetting('emailNotifications')" 
                                 id="emailToggle">
                            </div>
                        </div>
                        
                        <!-- Кнопка сохранения -->
                        <button class="save-btn" onclick="saveSettings()">💾 Сохранить настройки</button>
                        
                        <!-- Для учителя - дополнительные настройки -->
                        ${userRole === 'teacher' ? `
                            <div style="margin-top: 40px;">
                                <div class="settings-title" style="font-size: 22px;">📝 Управление викторинами</div>
                                
                                <div class="setting-item">
                                    <div>
                                        <div class="setting-label">Мои викторины</div>
                                        <div class="setting-description">Всего создано викторин</div>
                                    </div>
                                    <span style="color: gold; font-size: 24px; font-weight: bold;" id="teacherQuizzesCount">0</span>
                                </div>
                                
                                <div class="setting-item">
                                    <div>
                                        <div class="setting-label">Проведено игр</div>
                                        <div class="setting-description">Всего сессий</div>
                                    </div>
                                    <span style="color: gold; font-size: 24px; font-weight: bold;" id="teacherSessionsCount">0</span>
                                </div>
                            </div>
                        ` : `
                            <div style="margin-top: 40px;">
                                <div class="settings-title" style="font-size: 22px;">📊 Моя статистика</div>
                                
                                <div class="setting-item">
                                    <div>
                                        <div class="setting-label">Пройдено викторин</div>
                                        <div class="setting-description">Всего игр</div>
                                    </div>
                                    <span style="color: gold; font-size: 24px; font-weight: bold;" id="studentQuizzesCount">0</span>
                                </div>
                                
                                <div class="setting-item">
                                    <div>
                                        <div class="setting-label">Сумма баллов</div>
                                        <div class="setting-description">За все время</div>
                                    </div>
                                    <span style="color: gold; font-size: 24px; font-weight: bold;" id="studentTotalScore">0</span>
                                </div>
                            </div>
                        `}
                    </div>
                </div>
            `;
            
            // Загружаем статистику
            loadStats();
        }

        // Переключение toggle
        function toggleSetting(setting) {
            userSettings[setting] = !userSettings[setting];
            const toggle = document.getElementById('emailToggle');
            if (toggle) {
                toggle.classList.toggle('active');
            }
        }

        // Сохранение настроек
        async function saveSettings() {
            const fullName = document.getElementById('fullNameInput').value;
            const classFilter = document.getElementById('classFilter').value;
            const subjectFilter = document.getElementById('subjectFilter').value;
            
            if (fullName && fullName !== userFullName) {
                await db.ref('users/' + currentUser.uid).update({ fullName: fullName });
                userFullName = fullName;
            }
            
            const settings = {
                classFilter: classFilter,
                subjectFilter: subjectFilter,
                emailNotifications: userSettings.emailNotifications
            };
            
            await db.ref('users/' + currentUser.uid + '/settings').update(settings);
            userSettings = { ...userSettings, ...settings };
            
            alert('✅ Настройки сохранены!');
            updateUI();
        }

        // Загрузка статистики
        async function loadStats() {
            if (userRole === 'teacher') {
                // Статистика для учителя
                const quizzesSnap = await db.ref('quizzes').orderByChild('createdBy').equalTo(currentUser.uid).once('value');
                const quizzes = quizzesSnap.val();
                document.getElementById('teacherQuizzesCount').textContent = quizzes ? Object.keys(quizzes).length : 0;
                
                const sessionsSnap = await db.ref('teacherSessions/' + currentUser.uid).once('value');
                const sessions = sessionsSnap.val();
                document.getElementById('teacherSessionsCount').textContent = sessions ? Object.keys(sessions).length : 0;
            } else {
                // Статистика для ученика
                const resultsSnap = await db.ref('results').orderByChild('studentId').equalTo(currentUser.uid).once('value');
                const results = resultsSnap.val();
                
                if (results) {
                    const resultsArray = Object.values(results);
                    document.getElementById('studentQuizzesCount').textContent = resultsArray.length;
                    
                    const total = resultsArray.reduce((sum, r) => sum + r.score, 0);
                    document.getElementById('studentTotalScore').textContent = total;
                    
                    document.getElementById('totalQuizzes').textContent = resultsArray.length;
                    
                    const avg = total / resultsArray.length;
                    document.getElementById('avgScore').textContent = avg.toFixed(1);
                }
            }
        }
    </script>
</body>
</html>
