<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИЛЬЯКЛАСС - Профиль</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>
    <header class="header">
        <div style="display: flex; align-items: center; width: 100%; justify-content: space-between;">
            <div class="logo" onclick="window.location='index.html'">
                <span class="logo-il">ИЛЬ</span>
                <span class="logo-yaclass">ЯКЛАСС</span>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link">Викторины</a>
                <a href="results.html" class="nav-link">Результаты</a>
                <a href="profile.html" class="nav-link active">Профиль</a>
            </nav>
            <div id="userSection"></div>
        </div>
    </header>

    <main class="main-container">
        <div id="content">
            <div class="loading">Загрузка...</div>
        </div>
    </main>

    <script src="firebase.js"></script>
    <script>
        function loadPageContent() {
            const content = document.getElementById('content');
            
            if (!currentUser) {
                content.innerHTML = `
                    <div class="login-container">
                        <div class="login-card">
                            <h2>Войдите в профиль</h2>
                            <button class="login-big-btn" onclick="signIn()" style="font-size: 1.2rem; padding: 1rem 2rem;">
                                Войти через Google
                            </button>
                        </div>
                    </div>
                `;
                return;
            }

            content.innerHTML = `
                <div style="display: grid; grid-template-columns: 300px 1fr; gap: 2rem;">
                    <div class="settings-section" style="text-align: center;">
                        <img src="${currentUser.photoURL}" style="width: 150px; height: 150px; border-radius: 50%; border: 4px solid #ffd700; margin-bottom: 1rem;">
                        <h2>${userFullName || currentUser.displayName}</h2>
                        <p style="color: #aaa;">${currentUser.email}</p>
                        <div style="background: #ffd700; color: #0b1120; display: inline-block; padding: 0.3rem 1rem; border-radius: 30px; margin-top: 1rem;">
                            ${userRole === 'teacher' ? '👨‍🏫 Учитель' : '👨‍🎓 Ученик'}
                        </div>
                    </div>

                    <div class="settings-section">
                        <h2 style="color: #ffd700; margin-bottom: 2rem;">⚙️ Настройки профиля</h2>
                        
                        <div class="setting-item">
                            <div>
                                <div class="setting-label">Фамилия и Имя</div>
                                <div class="setting-description">Как вас видно в списках учеников</div>
                            </div>
                            <div style="display: flex; gap: 1rem;">
                                <input type="text" id="fullNameInput" value="${userFullName || ''}" 
                                       placeholder="Иванов Иван" 
                                       style="padding: 0.5rem; border-radius: 10px; background: #0f172a; color: white; border: 1px solid #ffd700;">
                                <button onclick="updateFullName()" style="background: #ffd700; color: #0b1120; border: none; padding: 0.5rem 1rem; border-radius: 10px; cursor: pointer;">
                                    Сохранить
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        async function updateFullName() {
            const newName = document.getElementById('fullNameInput').value;
            if (!newName) {
                alert('Введите фамилию и имя');
                return;
            }
            
            await db.ref('users/' + currentUser.uid).update({
                fullName: newName
            });
            
            userFullName = newName;
            alert('Имя сохранено!');
            window.location.reload();
        }
    </script>
</body>
</html>
