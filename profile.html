<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИЛЬЯКЛАСС - Профиль</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>
    <header class="header">
        <div style="display: flex; align-items: center; gap: 30px;">
            <div class="logo" onclick="window.location='index.html'">
                <span class="logo-il">ИЛЬ</span>
                <span class="logo-yaclass">ЯКЛАСС</span>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link">Викторины</a>
                <a href="results.html" class="nav-link">Результаты</a>
                <a href="profile.html" class="nav-link active">Профиль</a>
            </nav>
        </div>
        <div id="userSection"></div>
    </header>
    <main class="main-container">
        <div class="login-container">
            <div class="login-card">
                <h2 style="color: #ffd700; font-size: 36px;">👤 Профиль</h2>
                <p style="margin: 30px 0; color: #aaa;">Здесь будут настройки профиля</p>
                <button class="login-btn" onclick="window.location='index.html'">На главную</button>
            </div>
        </div>
    </main>
    <script src="firebase.js"></script>
    <script>
        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('userSection').innerHTML = `
                    <div class="user-card">
                        <img src="${user.photoURL}" class="avatar">
                        <span>${user.displayName}</span>
                        <button onclick="auth.signOut()" class="logout-btn">Выйти</button>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
