<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИЛЬЯКЛАСС - Профиль</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        /* СТИЛИ ДЛЯ ПРОФИЛЯ */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body {
            background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            min-height: 100vh;
        }
        body.light-theme {
            background: linear-gradient(145deg, #667eea 0%, #764ba2 100%);
            color: #1a1a2e;
        }
        .header {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255,215,0,0.3);
            padding: 12px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .logo { font-size: 32px; font-weight: 900; cursor: pointer; }
        .logo-il { color: #ffd700; }
        .logo-yaclass { color: #00ffff; }
        .nav-menu { display: flex; gap: 10px; }
        .nav-link {
            padding: 8px 20px;
            border-radius: 40px;
            background: rgba(255,255,255,0.15);
            color: white;
            text-decoration: none;
        }
        .nav-link.active { background: rgba(255,215,0,0.3); }
        .main-container { max-width: 1400px; margin: 25px auto; padding: 0 20px; }
        
        .profile-container {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 25px;
            margin-top: 20px;
        }
        .profile-sidebar, .profile-main {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 30px;
            padding: 30px;
        }
        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #ffd700;
            margin-bottom: 20px;
            object-fit: cover;
        }
        .profile-name { font-size: 22px; color: #ffd700; font-weight: 700; margin-bottom: 8px; }
        .profile-email { color: rgba(255,255,255,0.7); font-size: 14px; margin-bottom: 20px; }
        .settings-title { color: #ffd700; font-size: 20px; margin-bottom: 20px; }
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            flex-wrap: wrap;
        }
        .setting-label { font-weight: 600; color: white; }
        .setting-input {
            padding: 10px 15px;
            border-radius: 25px;
            border: 1px solid rgba(255,215,0,0.3);
            background: rgba(0,0,0,0.2);
            color: white;
            width: 250px;
        }
        .submit-quiz {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #1a1a2e;
            border: none;
            padding: 12px;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
        }
        @media (max-width: 768px) {
            .profile-container { grid-template-columns: 1fr; }
            .setting-input { width: 100%; }
        }
    </style>
</head>
<body class="dark-theme">
    <header class="header">
        <div class="header-left">
            <div class="logo" onclick="window.location='index.html'">
                <span class="logo-il">ИЛЬ</span>
                <span class="logo-yaclass">ЯКЛАСС</span>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link">Викторины</a>
                <a href="results.html" class="nav-link">Результаты</a>
                <a href="profile.html" class="nav-link active">Профиль</a>
            </nav>
        </div>
        <div class="header-right">
            <button class="theme-btn" onclick="toggleTheme()" id="themeToggle">☀️ Светлая</button>
            <div id="userSection"></div>
        </div>
    </header>

    <main class="main-container">
        <div id="content" class="loading">Загрузка профиля...</div>
    </main>

    <script src="firebase.js"></script>
    <script src="auth.js"></script>
    <script>
        function toggleTheme() {
            const body = document.body;
            const themeBtn = document.getElementById('themeToggle');
            if (body.classList.contains('dark-theme')) {
                body.classList.remove('dark-theme');
                body.classList.add('light-theme');
                themeBtn.textContent = '🌙 Темная';
                localStorage.setItem('theme', 'light');
            } else {
                body.classList.remove('light-theme');
                body.classList.add('dark-theme');
                themeBtn.textContent = '☀️ Светлая';
                localStorage.setItem('theme', 'dark');
            }
        }

        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.body.className = savedTheme + '-theme';
        document.getElementById('themeToggle').textContent = savedTheme === 'dark' ? '☀️ Светлая' : '🌙 Темная';

        // Используем DEFAULT_AVATAR из firebase.js
        const DEVELOPER_EMAIL = 'ilyagulkov25@gmail.com';
        let profileSubjects = [];
        const defaultSubjects = [
            'Русский язык', 'Алгебра', 'Геометрия', 'Математика', 
            'Химия', 'Физика', 'Литература', 'Английский язык', 
            'История', 'Физкультура'
        ];

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                const simpleUser = getCurrentSimpleUser();
                
                if (simpleUser) {
                    userRole = simpleUser.role;
                    userFullName = simpleUser.fullName || simpleUser.username;
                    userIsModerator = simpleUser.isModerator || false;
                    
                    document.getElementById('userSection').innerHTML = `
                        <div class="user-card">
                            <img src="${DEFAULT_AVATAR}" class="avatar">
                            <span>${userFullName}</span>
                            <button onclick="signOut()" class="logout-btn">Выйти</button>
                        </div>
                    `;
                    loadProfileContent(simpleUser);
                } else {
                    const userData = (await db.ref('users/' + user.uid).once('value')).val();
                    if (userData) {
                        userRole = userData.role;
                        userFullName = userData.fullName || user.displayName;
                        userIsModerator = userData.isModerator || false;
                    }
                    document.getElementById('userSection').innerHTML = `
                        <div class="user-card">
                            <img src="${user.photoURL || DEFAULT_AVATAR}" class="avatar">
                            <span>${userFullName || user.displayName}</span>
                            <button onclick="signOut()" class="logout-btn">Выйти</button>
                        </div>
                    `;
                    loadProfileContent(user);
                }
            } else {
                window.location.href = 'index.html';
            }
        });

        function signOut() {
            if (getCurrentSimpleUser()) {
                localStorage.removeItem('currentSimpleUser');
            } else {
                auth.signOut();
            }
            window.location.href = 'index.html';
        }

        function loadProfileContent(user) {
            document.getElementById('content').innerHTML = `
                <div class="profile-container">
                    <div class="profile-sidebar">
                        <img src="${user.photoURL || DEFAULT_AVATAR}" class="profile-avatar">
                        <div class="profile-name">${userFullName}</div>
                        <div class="profile-email">${user.email || 'local@user'}</div>
                    </div>
                    <div class="profile-main">
                        <h2 class="settings-title">⚙️ Настройки</h2>
                        <div class="setting-item">
                            <span class="setting-label">Имя:</span>
                            <input type="text" id="fullNameInput" class="setting-input" value="${userFullName}">
                        </div>
                        <button class="submit-quiz" onclick="saveFullName()">Сохранить</button>
                    </div>
                </div>
            `;
        }

        async function saveFullName() {
            const newName = document.getElementById('fullNameInput').value;
            if (!newName) return alert('Введите имя');
            
            const simpleUser = getCurrentSimpleUser();
            if (simpleUser) {
                await db.ref('simple_users/' + simpleUser.id).update({ fullName: newName });
                simpleUser.fullName = newName;
                localStorage.setItem('currentSimpleUser', JSON.stringify(simpleUser));
            } else {
                await db.ref('users/' + currentUser.uid).update({ fullName: newName });
            }
            alert('Имя сохранено!');
            window.location.reload();
        }
    </script>
</body>
</html>
