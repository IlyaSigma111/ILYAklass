<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИЛЬЯКЛАСС</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>
    <header class="header">
        <div style="display: flex; align-items: center; gap: 30px;">
            <div class="logo" onclick="window.location='index.html'">
                <span class="logo-il">ИЛЬ</span>
                <span class="logo-yaclass">ЯКЛАСС</span>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link active">Викторины</a>
                <a href="results.html" class="nav-link">Результаты</a>
                <a href="profile.html" class="nav-link">Профиль</a>
            </nav>
        </div>
        <div id="userSection"></div>
    </header>

    <main class="main-container">
        <div id="content" class="loading">Загрузка...</div>
    </main>

    <!-- Модальное окно выбора роли -->
    <div id="roleModal" class="modal-overlay" style="display: none;">
        <div class="role-modal">
            <h2>Добро пожаловать!</h2>
            <p style="color: #aaa; margin: 20px 0;">Выберите роль — это навсегда</p>
            <div class="role-options">
                <div class="role-option teacher" onclick="selectRole('teacher')">
                    <div class="role-icon">👨‍🏫</div>
                    <h3>Учитель</h3>
                </div>
                <div class="role-option student" onclick="selectRole('student')">
                    <div class="role-icon">👨‍🎓</div>
                    <h3>Ученик</h3>
                </div>
            </div>
            <p class="warning-text">⚠️ После выбора роль нельзя изменить</p>
        </div>
    </div>

    <script>
        // Твой Firebase конфиг
        const firebaseConfig = {
            apiKey: "AIzaSyA-FGoB1L-euPEfGZvTN0pyfyLGZY4zGyE",
            authDomain: "ilyaklass-b11c0.firebaseapp.com",
            projectId: "ilyaklass-b11c0",
            storageBucket: "ilyaklass-b11c0.firebasestorage.app",
            messagingSenderId: "803990572684",
            appId: "1:803990572684:web:f10f6399a2c0c035e5b5a9",
            databaseURL: "https://ilyaklass-b11c0-default-rtdb.firebaseio.com/"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const provider = new firebase.auth.GoogleAuthProvider();

        let currentUser = null;
        let userRole = null;
        let userFullName = null;

        // Проверка авторизации
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                const userRef = db.ref('users/' + user.uid);
                const snapshot = await userRef.once('value');
                const userData = snapshot.val();
                
                if (userData && userData.role) {
                    userRole = userData.role;
                    userFullName = userData.fullName;
                    document.getElementById('roleModal').style.display = 'none';
                    updateUI();
                    loadContent();
                } else {
                    document.getElementById('roleModal').style.display = 'flex';
                    updateUI();
                }
            } else {
                currentUser = null;
                userRole = null;
                userFullName = null;
                updateUI();
                loadContent();
            }
        });

        // Вход
        function signIn() {
            auth.signInWithPopup(provider);
        }

        // Выход
        function signOut() {
            auth.signOut();
        }

        // Выбор роли
        async function selectRole(role) {
            if (!currentUser) return;
            
            await db.ref('users/' + currentUser.uid).set({
                email: currentUser.email,
                googleName: currentUser.displayName,
                avatar: currentUser.photoURL,
                role: role,
                fullName: '',
                registeredAt: Date.now()
            });
            
            document.getElementById('roleModal').style.display = 'none';
            askFullName();
        }

        // Запрос ФИО
        function askFullName() {
            const name = prompt('Введите вашу фамилию и имя:');
            if (name) {
                db.ref('users/' + currentUser.uid).update({ fullName: name });
                userFullName = name;
                window.location.reload();
            }
        }

        // Обновление интерфейса
        function updateUI() {
            const userSection = document.getElementById('userSection');
            if (!userSection) return;
            
            if (currentUser) {
                userSection.innerHTML = `
                    <div class="user-card">
                        <img src="${currentUser.photoURL}" class="avatar">
                        <span>${userFullName || currentUser.displayName}</span>
                        <span class="role-badge">${userRole === 'teacher' ? 'Учитель' : 'Ученик'}</span>
                        <button onclick="signOut()" class="logout-btn">Выйти</button>
                    </div>
                `;
            } else {
                userSection.innerHTML = '';
            }
        }

        // Загрузка контента
        function loadContent() {
            const content = document.getElementById('content');
            
            if (!currentUser) {
                content.innerHTML = `
                    <div class="login-container">
                        <div class="login-card">
                            <div class="login-title">
                                <span class="logo-il">ИЛЬ</span>
                                <span class="logo-yaclass">ЯКЛАСС</span>
                            </div>
                            <div class="login-subtitle">Войдите, чтобы продолжить</div>
                            <button class="login-big-btn" onclick="signIn()">
                                🔑 Войти через Google
                            </button>
                        </div>
                    </div>
                `;
                return;
            }

            if (userRole === 'teacher') {
                content.innerHTML = `
                    <button class="add-quiz-btn" onclick="toggleForm()">➕ Создать викторину</button>
                    
                    <div id="quizForm" class="quiz-form">
                        <h3 style="color: gold; margin-bottom: 20px;">Новая викторина</h3>
                        <div class="form-group">
                            <label>Класс</label>
                            <select id="quizClass">
                                <option value="5">5 класс</option>
                                <option value="6">6 класс</option>
                                <option value="7">7 класс</option>
                                <option value="8">8 класс</option>
                                <option value="9">9 класс</option>
                                <option value="10">10 класс</option>
                                <option value="11">11 класс</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Предмет</label>
                            <input type="text" id="quizSubject" placeholder="Английский язык">
                        </div>
                        <div class="form-group">
                            <label>Тема</label>
                            <input type="text" id="quizTopic" placeholder="Conditionals">
                        </div>
                        <div class="form-group">
                            <label>Название папки</label>
                            <input type="text" id="quizFolder" placeholder="conditionals">
                        </div>
                        <div class="form-group">
                            <label>Макс. балл</label>
                            <input type="number" id="quizMaxScore" placeholder="15">
                        </div>
                        <button class="submit-quiz" onclick="saveQuiz()">Создать</button>
                    </div>

                    <h2 style="margin: 30px 0 20px;">📚 Все викторины</h2>
                    <div id="quizzesList" class="quiz-grid">Загрузка...</div>

                    <div class="my-quizzes-section">
                        <h2 class="section-title">📋 Мои викторины</h2>
                        <div id="myQuizzesList"></div>
                    </div>
                `;
            } else {
                content.innerHTML = `
                    <h2 style="margin: 30px 0 20px;">📚 Доступные викторины</h2>
                    <div id="quizzesList" class="quiz-grid">Загрузка...</div>
                    
                    <div class="my-quizzes-section">
                        <h2 class="section-title">📊 Мои результаты</h2>
                        <div id="myResults"></div>
                    </div>
                `;
            }

            loadQuizzes();
            if (userRole === 'teacher') {
                loadTeacherSessions();
            } else {
                loadStudentResults();
            }
        }

        // Загрузка викторин
        function loadQuizzes() {
            db.ref('quizzes').on('value', (snapshot) => {
                const quizzes = snapshot.val();
                const container = document.getElementById('quizzesList');
                if (!container) return;
                
                if (!quizzes) {
                    container.innerHTML = '<p>Пока нет викторин</p>';
                    return;
                }

                let html = '';
                Object.keys(quizzes).forEach(key => {
                    const q = quizzes[key];
                    html += `
                        <div class="quiz-card">
                            <div class="quiz-class">${q.class} класс</div>
                            <div class="quiz-title">${q.subject}</div>
                            <div style="margin-bottom: 10px;">${q.topic}</div>
                            <div style="color: gold; margin-bottom: 15px;">Макс: ${q.maxScore}</div>
                            <div class="quiz-actions">
                                ${userRole === 'teacher' ? 
                                    `<button class="btn btn-teacher" onclick="startQuiz('${key}', '${q.folder}', '${q.subject}', '${q.topic}', ${q.maxScore})">Запустить</button>` : 
                                    `<button class="btn btn-student" onclick="joinQuiz('${key}', '${q.folder}', '${q.subject}', '${q.topic}', ${q.maxScore})">Играть</button>`
                                }
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            });
        }

        // Учитель запускает викторину
        async function startQuiz(quizId, folder, subject, topic, maxScore) {
            const sessionRef = db.ref('sessions').push();
            const sessionId = sessionRef.key;
            
            await sessionRef.set({
                quizId: quizId,
                quizFolder: folder,
                quizSubject: subject,
                quizTopic: topic,
                maxScore: maxScore,
                teacherId: currentUser.uid,
                teacherName: userFullName,
                status: 'active',
                startedAt: Date.now(),
                students: {}
            });
            
            await db.ref(`teacherSessions/${currentUser.uid}/${sessionId}`).set({
                quizSubject: subject,
                quizTopic: topic,
                maxScore: maxScore,
                status: 'active',
                startedAt: Date.now(),
                students: {}
            });
            
            window.open(`https://ilyasigma111.github.io/${folder}/teacher.html?session=${sessionId}`, '_blank');
            loadTeacherSessions();
        }

        // Ученик присоединяется
        async function joinQuiz(quizId, folder, subject, topic, maxScore) {
            if (!userFullName) {
                askFullName();
                return;
            }
            
            const sessions = await db.ref('sessions').orderByChild('quizId').equalTo(quizId).once('value');
            let activeSession = null;
            
            sessions.forEach(s => {
                if (s.val().status === 'active') activeSession = { id: s.key, ...s.val() };
            });
            
            if (!activeSession) {
                alert('Нет активной викторины');
                return;
            }
            
            await db.ref(`sessions/${activeSession.id}/students/${currentUser.uid}`).set({
                name: userFullName,
                email: currentUser.email,
                joinedAt: Date.now()
            });
            
            await db.ref(`teacherSessions/${activeSession.teacherId}/${activeSession.id}/students/${currentUser.uid}`).set({
                name: userFullName,
                email: currentUser.email
            });
            
            window.open(`https://ilyasigma111.github.io/${folder}/student.html?session=${activeSession.id}&student=${currentUser.uid}&name=${encodeURIComponent(userFullName)}`, '_blank');
        }

        // Загрузка сессий учителя
        function loadTeacherSessions() {
            db.ref(`teacherSessions/${currentUser.uid}`).on('value', (snapshot) => {
                const sessions = snapshot.val();
                const container = document.getElementById('myQuizzesList');
                if (!container) return;
                
                if (!sessions) {
                    container.innerHTML = '<p>Нет проведенных викторин</p>';
                    return;
                }

                let html = '';
                Object.keys(sessions).sort((a,b) => sessions[b].startedAt - sessions[a].startedAt).forEach(id => {
                    const s = sessions[id];
                    const date = new Date(s.startedAt).toLocaleString();
                    
                    html += `
                        <div class="session-card">
                            <div class="session-header">
                                <div>
                                    <strong style="color: gold;">${s.quizSubject} - ${s.quizTopic}</strong>
                                    <div style="color: #aaa;">${date}</div>
                                </div>
                                <span class="session-status ${s.status === 'active' ? 'status-active' : 'status-finished'}">
                                    ${s.status === 'active' ? 'Активна' : 'Завершена'}
                                </span>
                            </div>
                            
                            <div class="students-list" id="students-${id}">
                                ${renderStudents(s.students, s.maxScore, id, s.status)}
                            </div>
                            
                            ${s.status === 'active' ? `
                                <button class="finish-quiz-btn" onclick="finishQuiz('${id}')">
                                    Завершить викторину
                                </button>
                            ` : ''}
                            
                            ${s.status === 'finished' ? `
                                <button class="save-scores-btn" onclick="saveScores('${id}')">
                                    Сохранить результаты
                                </button>
                            ` : ''}
                        </div>
                    `;
                });
                container.innerHTML = html;
            });
        }

        function renderStudents(students, maxScore, sessionId, status) {
            if (!students) return '<p>Пока нет учеников</p>';
            
            let html = '';
            Object.keys(students).forEach(id => {
                html += `
                    <div class="student-item">
                        <span>${students[id].name}</span>
                        ${status === 'finished' ? 
                            `<input type="number" class="score-input" id="score-${sessionId}-${id}" max="${maxScore}" min="0" placeholder="0-${maxScore}">` :
                            '<span style="color: #10b981;">✓ Присоединился</span>'
                        }
                    </div>
                `;
            });
            return html;
        }

        async function finishQuiz(sessionId) {
            await db.ref(`sessions/${sessionId}`).update({ status: 'finished' });
            await db.ref(`teacherSessions/${currentUser.uid}/${sessionId}`).update({ status: 'finished' });
        }

        async function saveScores(sessionId) {
            const session = await db.ref(`sessions/${sessionId}`).once('value');
            const s = session.val();
            
            if (!s || !s.students) return;
            
            let count = 0;
            for (const studentId of Object.keys(s.students)) {
                const input = document.getElementById(`score-${sessionId}-${studentId}`);
                if (!input) continue;
                
                const score = parseInt(input.value);
                if (isNaN(score)) continue;
                
                await db.ref('results').push({
                    studentId: studentId,
                    studentName: s.students[studentId].name,
                    quizSubject: s.quizSubject,
                    quizTopic: s.quizTopic,
                    score: score,
                    maxScore: s.maxScore,
                    teacherId: currentUser.uid,
                    date: Date.now()
                });
                count++;
            }
            
            alert(`Сохранено ${count} результатов!`);
        }

        // Результаты ученика
        function loadStudentResults() {
            db.ref('results').orderByChild('studentId').equalTo(currentUser.uid).on('value', (snapshot) => {
                const results = snapshot.val();
                const container = document.getElementById('myResults');
                if (!container) return;
                
                if (!results) {
                    container.innerHTML = '<p>Пока нет результатов</p>';
                    return;
                }

                let html = '<div class="students-list">';
                Object.keys(results).sort((a,b) => results[b].date - results[a].date).forEach(key => {
                    const r = results[key];
                    html += `
                        <div class="student-item">
                            <div>
                                <strong>${r.quizSubject} - ${r.quizTopic}</strong>
                                <div style="color: #aaa;">${new Date(r.date).toLocaleDateString()}</div>
                            </div>
                            <span class="score-badge">${r.score}/${r.maxScore}</span>
                        </div>
                    `;
                });
                html += '</div>';
                container.innerHTML = html;
            });
        }

        function toggleForm() {
            document.getElementById('quizForm').classList.toggle('visible');
        }

        async function saveQuiz() {
            const data = {
                class: document.getElementById('quizClass').value,
                subject: document.getElementById('quizSubject').value,
                topic: document.getElementById('quizTopic').value,
                folder: document.getElementById('quizFolder').value,
                maxScore: parseInt(document.getElementById('quizMaxScore').value),
                teacherLink: `https://ilyasigma111.github.io/${document.getElementById('quizFolder').value}/teacher.html`,
                studentLink: `https://ilyasigma111.github.io/${document.getElementById('quizFolder').value}/student.html`,
                createdBy: currentUser.uid,
                createdAt: Date.now()
            };

            if (!data.subject || !data.topic || !data.folder || !data.maxScore) {
                alert('Заполните все поля');
                return;
            }

            await db.ref('quizzes').push(data);
            document.getElementById('quizForm').classList.remove('visible');
            
            document.getElementById('quizSubject').value = '';
            document.getElementById('quizTopic').value = '';
            document.getElementById('quizFolder').value = '';
            document.getElementById('quizMaxScore').value = '';
        }
    </script>
</body>
</html>
