<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИЛЬЯКЛАСС - Главная</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>
    <header class="header">
        <div style="display: flex; align-items: center; width: 100%; justify-content: space-between;">
            <div class="logo" onclick="window.location='index.html'">
                <span class="logo-il">ИЛЬ</span>
                <span class="logo-yaclass">ЯКЛАСС</span>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link active">Викторины</a>
                <a href="results.html" class="nav-link">Результаты</a>
                <a href="profile.html" class="nav-link">Профиль</a>
            </nav>
            <div id="userSection"></div>
        </div>
    </header>

    <main class="main-container">
        <div id="content"></div>
    </main>

    <!-- Модальное окно выбора роли -->
    <div id="roleModal" class="modal-overlay">
        <div class="role-modal">
            <h2>Добро пожаловать в ИЛЬЯКЛАСС!</h2>
            <p style="color: #aaa; margin-bottom: 2rem;">Выберите роль — это решение нельзя будет изменить</p>
            
            <div class="role-options">
                <div class="role-option teacher" onclick="selectRole('teacher')">
                    <div class="role-icon">👨‍🏫</div>
                    <h3>Учитель</h3>
                    <p style="color: #aaa; margin-top: 1rem;">Создавать и проводить викторины</p>
                </div>
                <div class="role-option student" onclick="selectRole('student')">
                    <div class="role-icon">👨‍🎓</div>
                    <h3>Ученик</h3>
                    <p style="color: #aaa; margin-top: 1rem;">Проходить викторины и получать оценки</p>
                </div>
            </div>
            
            <p class="warning-text">⚠️ Внимание: после подтверждения роль изменить нельзя</p>
        </div>
    </div>

    <script src="firebase.js"></script>
    <script>
        let currentQuizSessions = {};

        function loadPageContent() {
            const content = document.getElementById('content');
            
            if (!currentUser) {
                // КРАСИВАЯ ЦЕНТРАЛЬНАЯ КНОПКА
                content.innerHTML = `
                    <div class="login-container">
                        <div class="login-card">
                            <div class="login-title">
                                <span class="logo-il">ИЛЬ</span>
                                <span class="logo-yaclass">ЯКЛАСС</span>
                            </div>
                            <div class="login-subtitle">Войдите, чтобы продолжить</div>
                            <button class="login-big-btn" onclick="signIn()">
                                🔑 Войти через Google
                            </button>
                        </div>
                    </div>
                `;
                return;
            }

            if (userRole === 'teacher') {
                content.innerHTML = `
                    <button class="add-quiz-btn" onclick="toggleQuizForm()">➕ Создать новую викторину</button>
                    
                    <div id="quizForm" class="quiz-form">
                        <h3 style="color:#ffd700; margin-bottom:1.5rem;">Новая викторина</h3>
                        <div class="form-group">
                            <label>Класс</label>
                            <select id="quizClass">
                                <option value="5">5 класс</option>
                                <option value="6">6 класс</option>
                                <option value="7">7 класс</option>
                                <option value="8">8 класс</option>
                                <option value="9">9 класс</option>
                                <option value="10">10 класс</option>
                                <option value="11">11 класс</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Предмет</label>
                            <input type="text" id="quizSubject" placeholder="Например: Английский язык">
                        </div>
                        <div class="form-group">
                            <label>Тема</label>
                            <input type="text" id="quizTopic" placeholder="Например: Conditionals">
                        </div>
                        <div class="form-group">
                            <label>Название папки (после /)</label>
                            <input type="text" id="quizFolder" placeholder="Например: conditionals">
                        </div>
                        <div class="form-group">
                            <label>Максимальный балл</label>
                            <input type="number" id="quizMaxScore" placeholder="Например: 15">
                        </div>
                        <button class="submit-quiz" onclick="saveQuiz()">Создать викторину</button>
                    </div>

                    <h2 style="color: white; margin: 2rem 0 1rem;">📚 Все викторины</h2>
                    <div id="quizzesList" class="quiz-grid"></div>

                    <div id="myQuizzesSection" class="my-quizzes-section">
                        <h2 class="section-title">📋 Мои проведенные викторины</h2>
                        <div id="myQuizzesList"></div>
                    </div>
                `;
            } else {
                content.innerHTML = `
                    <h2 style="color: white; margin: 2rem 0 1rem;">📚 Доступные викторины</h2>
                    <div id="quizzesList" class="quiz-grid"></div>
                    
                    <div class="my-quizzes-section">
                        <h2 class="section-title">📊 Мои результаты</h2>
                        <div id="myResults"></div>
                    </div>
                `;
            }

            loadQuizzes();
            if (userRole === 'teacher') {
                loadTeacherSessions();
            } else {
                loadStudentResults();
            }
        }

        function loadQuizzes() {
            db.ref('quizzes').on('value', (snapshot) => {
                const quizzes = snapshot.val();
                renderQuizzes(quizzes);
            });
        }

        function renderQuizzes(quizzes) {
            const container = document.getElementById('quizzesList');
            if (!container) return;
            
            if (!quizzes) {
                container.innerHTML = '<p style="text-align:center; color:#aaa;">Пока нет викторин</p>';
                return;
            }

            let html = '';
            
            Object.keys(quizzes).forEach(key => {
                const q = quizzes[key];
                html += `
                    <div class="quiz-card">
                        <div class="quiz-class">${q.class} класс</div>
                        <div class="quiz-title">${q.subject}</div>
                        <div class="quiz-subject">${q.topic}</div>
                        <div style="margin: 1rem 0; color:#ffd700;">Макс. балл: ${q.maxScore}</div>
                        <div class="quiz-actions">
                            ${userRole === 'teacher' ? 
                                `<button class="btn btn-teacher" onclick="startQuiz('${key}', '${q.folder}', '${q.subject}', '${q.topic}', ${q.maxScore})">🎮 Запустить викторину</button>` : 
                                `<button class="btn btn-student" onclick="joinQuiz('${key}', '${q.folder}', '${q.subject}', '${q.topic}', ${q.maxScore})">👨‍🎓 Присоединиться</button>`
                            }
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // УЧИТЕЛЬ: запускает викторину
        async function startQuiz(quizId, folder, subject, topic, maxScore) {
            // Создаем сессию в Firebase
            const sessionRef = db.ref('sessions').push();
            const sessionId = sessionRef.key;
            
            const sessionData = {
                quizId: quizId,
                quizFolder: folder,
                quizSubject: subject,
                quizTopic: topic,
                maxScore: maxScore,
                teacherId: currentUser.uid,
                teacherName: userFullName,
                status: 'active',
                startedAt: firebase.database.ServerValue.TIMESTAMP,
                students: {} // Здесь будут ученики
            };
            
            await sessionRef.set(sessionData);
            
            // Сохраняем в "Мои викторины" учителя
            await db.ref(`teacherSessions/${currentUser.uid}/${sessionId}`).set(sessionData);
            
            // Открываем панель учителя
            window.open(`https://ilyasigma111.github.io/${folder}/teacher.html?session=${sessionId}`, '_blank');
            
            // Перезагружаем список моих викторин
            loadTeacherSessions();
        }

        // УЧЕНИК: присоединяется к викторине
        async function joinQuiz(quizId, folder, subject, topic, maxScore) {
            if (!userFullName) {
                alert('Сначала заполните фамилию и имя в профиле');
                window.location.href = 'profile.html';
                return;
            }
            
            // Ищем активную сессию этой викторины
            const sessionsSnapshot = await db.ref('sessions')
                .orderByChild('quizId')
                .equalTo(quizId)
                .once('value');
            
            const sessions = sessionsSnapshot.val();
            let activeSession = null;
            
            if (sessions) {
                Object.keys(sessions).forEach(key => {
                    if (sessions[key].status === 'active') {
                        activeSession = { id: key, ...sessions[key] };
                    }
                });
            }
            
            if (!activeSession) {
                alert('Сейчас нет активной викторины. Дождитесь, пока учитель запустит игру.');
                return;
            }
            
            // Добавляем ученика в сессию
            await db.ref(`sessions/${activeSession.id}/students/${currentUser.uid}`).set({
                name: userFullName,
                email: currentUser.email,
                joinedAt: firebase.database.ServerValue.TIMESTAMP
            });
            
            // Открываем страницу ученика
            window.open(`https://ilyasigma111.github.io/${folder}/student.html?session=${activeSession.id}&student=${currentUser.uid}&name=${encodeURIComponent(userFullName)}`, '_blank');
        }

        // Загрузка сессий учителя
        function loadTeacherSessions() {
            db.ref(`teacherSessions/${currentUser.uid}`).on('value', (snapshot) => {
                const sessions = snapshot.val();
                const container = document.getElementById('myQuizzesList');
                
                if (!container) return;
                
                if (!sessions) {
                    container.innerHTML = '<p style="color:#aaa;">Вы еще не проводили викторин</p>';
                    return;
                }
                
                let html = '';
                
                // Сортируем по дате (сначала новые)
                const sortedSessions = Object.keys(sessions).sort((a, b) => {
                    return sessions[b].startedAt - sessions[a].startedAt;
                });
                
                sortedSessions.forEach(sessionId => {
                    const s = sessions[sessionId];
                    const date = new Date(s.startedAt).toLocaleString();
                    
                    html += `
                        <div class="session-card" id="session-${sessionId}">
                            <div class="session-header">
                                <div>
                                    <strong style="color: #ffd700;">${s.quizSubject} - ${s.quizTopic}</strong>
                                    <div style="color: #aaa; font-size: 0.9rem;">${date}</div>
                                </div>
                                <span class="session-status ${s.status === 'active' ? 'status-active' : 'status-finished'}">
                                    ${s.status === 'active' ? '🟢 Активна' : '🔵 Завершена'}
                                </span>
                            </div>
                            
                            <div id="students-${sessionId}" class="students-list">
                                ${renderStudentsList(s.students, s.maxScore, sessionId, s.status)}
                            </div>
                            
                            ${s.status === 'active' ? `
                                <button class="finish-quiz-btn" onclick="finishQuiz('${sessionId}')">
                                    🏁 Викторина завершена
                                </button>
                            ` : ''}
                            
                            ${s.status === 'finished' ? `
                                <button class="save-scores-btn" onclick="saveScores('${sessionId}')">
                                    💾 Сохранить результаты
                                </button>
                            ` : ''}
                        </div>
                    `;
                });
                
                container.innerHTML = html;
            });
        }

        function renderStudentsList(students, maxScore, sessionId, status) {
            if (!students) {
                return '<p style="color:#aaa;">Пока никто не присоединился</p>';
            }
            
            let html = '';
            
            Object.keys(students).forEach(studentId => {
                const s = students[studentId];
                html += `
                    <div class="student-item">
                        <span>${s.name}</span>
                        ${status === 'finished' ? 
                            `<input type="number" class="score-input" id="score-${sessionId}-${studentId}" 
                                    placeholder="0-${maxScore}" max="${maxScore}" min="0">` :
                            `<span style="color:#10b981;">✓ Присоединился</span>`
                        }
                    </div>
                `;
            });
            
            return html;
        }

        async function finishQuiz(sessionId) {
            await db.ref(`sessions/${sessionId}`).update({
                status: 'finished'
            });
            
            await db.ref(`teacherSessions/${currentUser.uid}/${sessionId}`).update({
                status: 'finished'
            });
        }

        async function saveScores(sessionId) {
            const sessionRef = await db.ref(`sessions/${sessionId}`).once('value');
            const session = sessionRef.val();
            
            if (!session) return;
            
            const students = session.students;
            if (!students) return;
            
            let savedCount = 0;
            
            for (const studentId of Object.keys(students)) {
                const scoreInput = document.getElementById(`score-${sessionId}-${studentId}`);
                if (!scoreInput) continue;
                
                const score = parseInt(scoreInput.value);
                if (isNaN(score)) continue;
                
                // Сохраняем результат
                await db.ref('results').push({
                    studentId: studentId,
                    studentName: students[studentId].name,
                    quizId: session.quizId,
                    quizSubject: session.quizSubject,
                    quizTopic: session.quizTopic,
                    class: session.quizClass,
                    score: score,
                    maxScore: session.maxScore,
                    teacherId: currentUser.uid,
                    teacherName: userFullName,
                    date: firebase.database.ServerValue.TIMESTAMP
                });
                
                savedCount++;
            }
            
            alert(`Сохранено ${savedCount} результатов!`);
            
            // Обновляем статус в учительской сессии
            await db.ref(`teacherSessions/${currentUser.uid}/${sessionId}`).update({
                resultsSaved: true
            });
        }

        // Загрузка результатов ученика
        function loadStudentResults() {
            db.ref('results').orderByChild('studentId').equalTo(currentUser.uid).on('value', (snapshot) => {
                const results = snapshot.val();
                const container = document.getElementById('myResults');
                
                if (!container) return;
                
                if (!results) {
                    container.innerHTML = '<p style="color:#aaa;">У вас пока нет результатов</p>';
                    return;
                }
                
                let html = '<div class="students-list">';
                
                Object.keys(results).sort((a, b) => results[b].date - results[a].date).forEach(key => {
                    const r = results[key];
                    const date = new Date(r.date).toLocaleDateString();
                    
                    html += `
                        <div class="student-item">
                            <div>
                                <strong>${r.quizSubject} - ${r.quizTopic}</strong>
                                <div style="color: #aaa; font-size: 0.9rem;">${date}</div>
                            </div>
                            <span class="score-badge">${r.score}/${r.maxScore}</span>
                        </div>
                    `;
                });
                
                html += '</div>';
                container.innerHTML = html;
            });
        }

        function toggleQuizForm() {
            document.getElementById('quizForm').classList.toggle('visible');
        }

        async function saveQuiz() {
            const quizClass = document.getElementById('quizClass').value;
            const subject = document.getElementById('quizSubject').value;
            const topic = document.getElementById('quizTopic').value;
            const folder = document.getElementById('quizFolder').value;
            const maxScore = document.getElementById('quizMaxScore').value;

            if (!subject || !topic || !folder || !maxScore) {
                alert('Заполните все поля');
                return;
            }

            const quizData = {
                class: quizClass,
                subject: subject,
                topic: topic,
                folder: folder,
                maxScore: parseInt(maxScore),
                teacherLink: `https://ilyasigma111.github.io/${folder}/teacher.html`,
                studentLink: `https://ilyasigma111.github.io/${folder}/student.html`,
                createdBy: currentUser.uid,
                createdAt: firebase.database.ServerValue.TIMESTAMP
            };

            await db.ref('quizzes').push(quizData);
            document.getElementById('quizForm').classList.remove('visible');
            
            document.getElementById('quizSubject').value = '';
            document.getElementById('quizTopic').value = '';
            document.getElementById('quizFolder').value = '';
            document.getElementById('quizMaxScore').value = '';
        }
    </script>
</body>
</html>
