<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ИЛЬЯКЛАСС</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        /* КРАСИВЫЙ ЭКРАН ЛОГИНА */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 40px;
            padding: 50px 40px;
            text-align: center;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-title {
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .login-subtitle {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 35px;
            font-size: 16px;
        }

        .login-big-btn {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            border: none;
            padding: 16px 30px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            color: #1a1a2e;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
            margin-bottom: 20px;
        }

        .login-big-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 15px 40px rgba(255, 215, 0, 0.5);
        }

        .login-options {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .login-option-btn {
            flex: 1;
            padding: 12px;
            border-radius: 40px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-option-btn:hover {
            background: rgba(255, 215, 0, 0.15);
            border-color: #ffd700;
        }

        .login-option-btn.active {
            background: rgba(255, 215, 0, 0.2);
            border-color: #ffd700;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            color: #ffd700;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 30px;
            border: 2px solid rgba(255, 215, 0, 0.2);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            border-color: #ffd700;
            outline: none;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .submit-quiz {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #1a1a2e;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .submit-quiz:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
        }

        .finish-quiz-btn {
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 14px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
        }

        .finish-quiz-btn:hover {
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.1);
        }

        .test-accounts {
            margin-top: 25px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
        }

        .test-accounts small {
            display: block;
            margin-top: 8px;
            color: #ffd700;
        }

        .close-btn {
            margin-top: 20px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px;
            border-radius: 40px;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body class="dark-theme">
    <header class="header">
        <div class="header-left">
            <div class="logo" onclick="window.location='index.html'">
                <span class="logo-il">ИЛЬ</span>
                <span class="logo-yaclass">ЯКЛАСС</span>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link active">Викторины</a>
                <a href="results.html" class="nav-link">Результаты</a>
                <a href="profile.html" class="nav-link">Профиль</a>
            </nav>
        </div>
        <div class="header-right">
            <button class="theme-btn" onclick="toggleTheme()" id="themeToggle">☀️ Светлая</button>
            <div id="userSection"></div>
        </div>
    </header>

    <main class="main-container">
        <div id="content" class="loading">Загрузка...</div>
    </main>

    <!-- Модальное окно входа -->
    <div id="simpleLoginModal" class="modal-overlay" style="display: none;">
        <div class="role-modal" style="max-width: 450px; padding: 30px;">
            <h2 style="color: #ffd700; margin-bottom: 25px; text-align: center;">🔑 Вход в ИЛЬЯКЛАСС</h2>
            
            <div class="login-options">
                <button class="login-option-btn active" onclick="showSimpleLogin()" id="simpleTab">👤 По нику</button>
                <button class="login-option-btn" onclick="showGoogleLogin()" id="googleTab">G Google</button>
            </div>

            <div id="googleLoginSection" style="display: none;">
                <button class="login-big-btn" onclick="signIn()">
                    🔑 Войти через Google
                </button>
            </div>

            <div id="simpleLoginSection">
                <div class="form-group">
                    <label>👤 Никнейм</label>
                    <input type="text" id="simpleUsername" placeholder="Введите никнейм">
                </div>
                
                <div class="form-group">
                    <label>🔐 Пароль</label>
                    <input type="password" id="simplePassword" placeholder="Введите пароль">
                </div>
                
                <div style="display: flex; gap: 15px; margin-top: 25px;">
                    <button class="submit-quiz" onclick="simpleLogin()" style="flex: 2;">Войти</button>
                    <button class="finish-quiz-btn" onclick="showRegisterModal()" style="flex: 1;">Регистрация</button>
                </div>
            </div>
            
            <div class="test-accounts">
                <div>📋 Тестовые аккаунты:</div>
                <small>👨‍🏫 teacher / 123</small>
                <small>👨‍🎓 student / 123</small>
                <small>🛡️ moderator / 123</small>
                <small>👑 Илья / 123</small>
            </div>
            
            <button class="close-btn" onclick="closeLoginModal()">Закрыть</button>
        </div>
    </div>

    <!-- Модальное окно регистрации -->
    <div id="registerModal" class="modal-overlay" style="display: none;">
        <div class="role-modal" style="max-width: 500px; padding: 30px;">
            <h2 style="color: #ffd700; margin-bottom: 25px; text-align: center;">📝 Регистрация</h2>
            
            <div class="form-group">
                <label>👤 Никнейм</label>
                <input type="text" id="regUsername" placeholder="Придумайте никнейм">
            </div>
            
            <div class="form-group">
                <label>🔐 Пароль</label>
                <input type="password" id="regPassword" placeholder="Придумайте пароль">
            </div>
            
            <div class="form-group">
                <label>🔄 Повторите пароль</label>
                <input type="password" id="regPasswordConfirm" placeholder="Повторите пароль">
            </div>
            
            <div class="form-group">
                <label>👑 Роль</label>
                <select id="regRole" style="width: 100%; padding: 14px; border-radius: 30px; background: rgba(0,0,0,0.3); color: white; border: 2px solid rgba(255,215,0,0.2);">
                    <option value="student">👨‍🎓 Ученик</option>
                    <option value="teacher">👨‍🏫 Учитель</option>
                </select>
            </div>
            
            <div style="display: flex; gap: 15px; margin-top: 30px;">
                <button class="submit-quiz" onclick="registerUser()" style="flex: 2;">Зарегистрироваться</button>
                <button class="finish-quiz-btn" onclick="closeRegisterModal()" style="flex: 1;">Назад</button>
            </div>
        </div>
    </div>

    <script src="firebase.js"></script>
    <script src="auth.js"></script>
    <script src="constructor.js"></script>
    <script src="app.js"></script>
    <script>
        // Переключение темы
        function toggleTheme() {
            const body = document.body;
            const themeBtn = document.getElementById('themeToggle');
            
            if (body.classList.contains('dark-theme')) {
                body.classList.remove('dark-theme');
                body.classList.add('light-theme');
                themeBtn.textContent = '🌙 Темная';
                localStorage.setItem('theme', 'light');
            } else {
                body.classList.remove('light-theme');
                body.classList.add('dark-theme');
                themeBtn.textContent = '☀️ Светлая';
                localStorage.setItem('theme', 'dark');
            }
        }

        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.body.classList.add(savedTheme + '-theme');
        document.getElementById('themeToggle').textContent = savedTheme === 'dark' ? '☀️ Светлая' : '🌙 Темная';

        // Функции для модальных окон
        function showLoginModal() {
            document.getElementById('simpleLoginModal').style.display = 'flex';
        }

        function closeLoginModal() {
            document.getElementById('simpleLoginModal').style.display = 'none';
        }

        function showGoogleLogin() {
            document.getElementById('googleLoginSection').style.display = 'block';
            document.getElementById('simpleLoginSection').style.display = 'none';
            document.getElementById('simpleTab').classList.remove('active');
            document.getElementById('googleTab').classList.add('active');
        }

        function showSimpleLogin() {
            document.getElementById('googleLoginSection').style.display = 'none';
            document.getElementById('simpleLoginSection').style.display = 'block';
            document.getElementById('googleTab').classList.remove('active');
            document.getElementById('simpleTab').classList.add('active');
        }

        function showRegisterModal() {
            closeLoginModal();
            document.getElementById('registerModal').style.display = 'flex';
        }

        function closeRegisterModal() {
            document.getElementById('registerModal').style.display = 'none';
            showLoginModal();
        }

        // Закрытие модалок по клику вне
        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('modal-overlay')) {
                e.target.style.display = 'none';
            }
        });

        // Показываем модалку входа если нет пользователя
        setTimeout(() => {
            if (!localStorage.getItem('currentSimpleUser') && !auth.currentUser) {
                showLoginModal();
            }
        }, 1000);
    </script>
</body>
</html>
