<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ИЛЬЯКЛАСС</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>
    <header class="header">
        <div style="display: flex; align-items: center; gap: 30px; flex-wrap: wrap;">
            <div class="logo" onclick="window.location='index.html'">
                <span class="logo-il">ИЛЬ</span>
                <span class="logo-yaclass">ЯКЛАСС</span>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link active">Викторины</a>
                <a href="results.html" class="nav-link">Результаты</a>
                <a href="profile.html" class="nav-link">Профиль</a>
            </nav>
        </div>
        <div id="userSection"></div>
    </header>

    <main class="main-container">
        <div id="content" class="loading">Загрузка...</div>
    </main>

    <!-- Модальное окно выбора роли -->
    <div id="roleModal" class="modal-overlay" style="display: none;">
        <div class="role-modal">
            <h2>Добро пожаловать в ИЛЬЯКЛАСС!</h2>
            <p style="color: #aaa; margin: 20px 0; font-size: 18px;">Выберите роль — это решение навсегда</p>
            <div class="role-options">
                <div class="role-option teacher" onclick="selectRole('teacher')">
                    <div class="role-icon">👨‍🏫</div>
                    <h3>Учитель</h3>
                    <p style="color: #aaa; margin-top: 15px;">Создавать и проводить викторины</p>
                </div>
                <div class="role-option student" onclick="selectRole('student')">
                    <div class="role-icon">👨‍🎓</div>
                    <h3>Ученик</h3>
                    <p style="color: #aaa; margin-top: 15px;">Проходить викторины и получать оценки</p>
                </div>
            </div>
            <p class="warning-text" style="color: #ff8888; text-align: center; font-size: 16px;">⚠️ После подтверждения роль изменить нельзя</p>
        </div>
    </div>

    <script src="firebase.js"></script>
    <script src="app.js"></script>
</body>
</html>
