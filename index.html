<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ИЛЬЯКЛАСС</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        /* ===== ГЛАССМОРФИЗМ В СТИЛЕ ЯКЛАСС ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0a1a2f 0%, #0f2a44 100%);
            min-height: 100vh;
            color: #fff;
            position: relative;
            overflow-x: hidden;
        }

        /* Эффект стекла */
        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 215, 0, 0.15);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .glass-card {
            background: rgba(10, 25, 45, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            border-color: rgba(255, 215, 0, 0.5);
            box-shadow: 0 20px 40px rgba(255, 215, 0, 0.2);
            transform: translateY(-5px);
        }

        /* Шапка */
        .header {
            background: rgba(10, 25, 45, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 2px solid rgba(255, 215, 0, 0.3);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 36px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .logo-il {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.7));
        }

        .logo-yaclass {
            background: linear-gradient(135deg, #00ffff, #0088ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(0, 255, 255, 0.7));
        }

        .nav-menu {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .nav-link {
            color: #fff;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            transition: all 0.3s;
            font-weight: 500;
        }

        .nav-link:hover {
            background: rgba(255, 215, 0, 0.2);
            border-color: #ffd700;
            transform: scale(1.05);
        }

        .nav-link.active {
            background: rgba(255, 215, 0, 0.3);
            border-color: #ffd700;
            color: #ffd700;
            font-weight: 700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        /* Пользовательская карточка */
        .user-card {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            padding: 5px 15px 5px 5px;
            border-radius: 50px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid #ffd700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        .role-badge {
            background: rgba(255, 215, 0, 0.2);
            backdrop-filter: blur(5px);
            color: #ffd700;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 700;
            border: 1px solid #ffd700;
        }

        .login-btn, .logout-btn {
            background: rgba(255, 215, 0, 0.2);
            backdrop-filter: blur(5px);
            color: #ffd700;
            border: 2px solid #ffd700;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-btn:hover, .logout-btn:hover {
            background: #ffd700;
            color: #0a1a2f;
            box-shadow: 0 0 25px #ffd700;
            transform: scale(1.05);
        }

        /* Основной контейнер */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }

        /* ===== КНОПКА ВХОДА ===== */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }

        .login-card {
            background: rgba(10, 25, 45, 0.7);
            backdrop-filter: blur(15px);
            border: 3px solid rgba(255, 215, 0, 0.5);
            border-radius: 60px;
            padding: 60px;
            text-align: center;
            max-width: 600px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        .login-title {
            font-size: 52px;
            margin-bottom: 20px;
        }

        .login-subtitle {
            color: #aaa;
            margin-bottom: 40px;
            font-size: 20px;
        }

        .login-big-btn {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #0a1a2f;
            border: none;
            padding: 20px 60px;
            border-radius: 60px;
            font-size: 28px;
            font-weight: 900;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
        }

        .login-big-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 50px #ffd700;
        }

        /* ===== МОДАЛЬНОЕ ОКНО ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 20px;
        }

        .role-modal {
            background: rgba(10, 25, 45, 0.9);
            backdrop-filter: blur(20px);
            padding: 50px;
            border-radius: 60px;
            max-width: 700px;
            border: 3px solid #ffd700;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.3);
        }

        .role-modal h2 {
            color: #ffd700;
            font-size: 40px;
            margin-bottom: 20px;
            text-align: center;
        }

        .role-options {
            display: flex;
            gap: 30px;
            margin: 40px 0;
            flex-wrap: wrap;
        }

        .role-option {
            flex: 1;
            min-width: 200px;
            padding: 40px 20px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .role-option:hover {
            border-color: #ffd700;
            transform: scale(1.05) translateY(-10px);
            box-shadow: 0 20px 40px rgba(255, 215, 0, 0.3);
        }

        .role-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .role-option h3 {
            color: #ffd700;
            font-size: 28px;
        }

        /* ===== ПРЕДМЕТНАЯ СЕТКА ===== */
        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin: 30px 0;
        }

        .subject-card {
            background: rgba(10, 25, 45, 0.6);
            backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 215, 0, 0.2);
            border-radius: 40px;
            padding: 30px 20px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .subject-card:hover {
            border-color: #ffd700;
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 20px 40px rgba(255, 215, 0, 0.3);
        }

        .subject-card.selected {
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.15);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
        }

        .subject-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .subject-name {
            color: #ffd700;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .subject-count {
            color: #aaa;
            font-size: 16px;
        }

        /* ===== КАРТОЧКИ ВИКТОРИН ===== */
        .quizzes-section {
            margin-top: 40px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .section-title {
            color: #ffd700;
            font-size: 32px;
            font-weight: 700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .add-quiz-btn {
            background: rgba(255, 215, 0, 0.2);
            backdrop-filter: blur(10px);
            color: #ffd700;
            border: 2px solid #ffd700;
            padding: 15px 35px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .add-quiz-btn:hover {
            background: #ffd700;
            color: #0a1a2f;
            transform: scale(1.05);
            box-shadow: 0 0 30px #ffd700;
        }

        .quiz-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .quiz-card {
            background: rgba(10, 25, 45, 0.6);
            backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 215, 0, 0.2);
            border-radius: 40px;
            padding: 25px;
            transition: all 0.3s;
        }

        .quiz-card:hover {
            border-color: #ffd700;
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(255, 215, 0, 0.2);
        }

        .quiz-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .badge-kahoot {
            background: rgba(255, 0, 128, 0.2);
            color: #ff69b4;
            border: 2px solid #ff1493;
        }

        .badge-simple {
            background: rgba(0, 255, 255, 0.2);
            color: #00ffff;
            border: 2px solid #00ced1;
        }

        .quiz-class {
            background: rgba(255, 215, 0, 0.2);
            color: #ffd700;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 30px;
            font-weight: 700;
            margin-bottom: 15px;
            border: 2px solid #ffd700;
        }

        .quiz-title {
            font-size: 28px;
            font-weight: 700;
            color: #ffd700;
            margin-bottom: 10px;
        }

        .quiz-subject {
            color: #00ffff;
            font-size: 18px;
            margin-bottom: 15px;
        }

        .quiz-link {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 15px;
            color: #aaa;
            font-size: 14px;
            word-break: break-all;
            margin: 15px 0;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .quiz-actions {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            flex: 1;
            text-decoration: none;
            backdrop-filter: blur(5px);
        }

        .btn-teacher {
            background: rgba(79, 70, 229, 0.3);
            color: #4f46e5;
            border: 2px solid #4f46e5;
        }

        .btn-student {
            background: rgba(5, 150, 105, 0.3);
            color: #10b981;
            border: 2px solid #10b981;
        }

        .btn-external {
            background: rgba(255, 215, 0, 0.3);
            color: #ffd700;
            border: 2px solid #ffd700;
        }

        .btn:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
            box-shadow: 0 0 20px currentColor;
        }

        /* ===== ФОРМА СОЗДАНИЯ ===== */
        .quiz-form {
            background: rgba(10, 25, 45, 0.8);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 50px;
            margin-bottom: 40px;
            border: 3px solid #ffd700;
            display: none;
        }

        .quiz-form.visible {
            display: block;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            color: #ffd700;
            margin-bottom: 10px;
            font-size: 18px;
            font-weight: 600;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 15px 20px;
            border-radius: 30px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-size: 16px;
            backdrop-filter: blur(5px);
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #ffd700;
            outline: none;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .radio-group {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px 25px;
            border-radius: 40px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            cursor: pointer;
        }

        .radio-option.selected {
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.15);
        }

        .radio-option input[type="radio"] {
            width: auto;
            margin-right: 10px;
            accent-color: #ffd700;
        }

        .submit-quiz {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #0a1a2f;
            border: none;
            padding: 18px;
            border-radius: 40px;
            font-weight: 900;
            font-size: 20px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        }

        .submit-quiz:hover {
            transform: scale(1.02);
            box-shadow: 0 0 50px #ffd700;
        }

        /* ===== МОИ ВИКТОРИНЫ ===== */
        .my-quizzes-section {
            margin-top: 50px;
            padding: 30px;
            background: rgba(10, 25, 45, 0.5);
            backdrop-filter: blur(12px);
            border-radius: 50px;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }

        .session-card {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 40px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .session-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .session-status {
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 700;
        }

        .status-active {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border: 2px solid #10b981;
        }

        .status-finished {
            background: rgba(79, 70, 229, 0.2);
            color: #4f46e5;
            border: 2px solid #4f46e5;
        }

        .students-list {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 30px;
            padding: 20px;
            margin: 20px 0;
        }

        .student-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
            flex-wrap: wrap;
            gap: 15px;
        }

        .student-item:last-child {
            border-bottom: none;
        }

        .score-input {
            width: 100px;
            padding: 10px;
            border-radius: 20px;
            border: 2px solid #ffd700;
            background: rgba(0, 0, 0, 0.3);
            color: white;
            text-align: center;
        }

        .finish-quiz-btn,
        .save-scores-btn {
            background: rgba(255, 215, 0, 0.2);
            color: #ffd700;
            border: 2px solid #ffd700;
            padding: 12px;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .finish-quiz-btn:hover,
        .save-scores-btn:hover {
            background: #ffd700;
            color: #0a1a2f;
            box-shadow: 0 0 30px #ffd700;
        }

        .score-badge {
            background: rgba(255, 215, 0, 0.2);
            color: #ffd700;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 700;
            border: 2px solid #ffd700;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #ffd700;
            font-size: 24px;
            background: rgba(10, 25, 45, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }

        /* ===== АДАПТАЦИЯ ===== */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                padding: 15px;
            }
            
            .nav-menu {
                justify-content: center;
            }
            
            .login-card {
                padding: 30px;
            }
            
            .login-title {
                font-size: 40px;
            }
            
            .login-big-btn {
                padding: 15px 40px;
                font-size: 22px;
            }
            
            .role-options {
                flex-direction: column;
            }
            
            .subjects-grid {
                grid-template-columns: 1fr;
            }
            
            .quiz-grid {
                grid-template-columns: 1fr;
            }
            
            .section-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .radio-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div style="display: flex; align-items: center; gap: 30px; flex-wrap: wrap;">
            <div class="logo" onclick="window.location='index.html'">
                <span class="logo-il">ИЛЬ</span>
                <span class="logo-yaclass">ЯКЛАСС</span>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link active">Викторины</a>
                <a href="results.html" class="nav-link">Результаты</a>
                <a href="profile.html" class="nav-link">Профиль</a>
            </nav>
        </div>
        <div id="userSection"></div>
    </header>

    <main class="main-container">
        <div id="content" class="loading">Загрузка...</div>
    </main>

    <!-- Модальное окно выбора роли -->
    <div id="roleModal" class="modal-overlay" style="display: none;">
        <div class="role-modal">
            <h2>Добро пожаловать в ИЛЬЯКЛАСС!</h2>
            <p style="color: #aaa; margin: 20px 0; font-size: 18px;">Выберите роль — это решение навсегда</p>
            <div class="role-options">
                <div class="role-option teacher" onclick="selectRole('teacher')">
                    <div class="role-icon">👨‍🏫</div>
                    <h3>Учитель</h3>
                    <p style="color: #aaa; margin-top: 15px;">Создавать и проводить викторины</p>
                </div>
                <div class="role-option student" onclick="selectRole('student')">
                    <div class="role-icon">👨‍🎓</div>
                    <h3>Ученик</h3>
                    <p style="color: #aaa; margin-top: 15px;">Проходить викторины и получать оценки</p>
                </div>
            </div>
            <p class="warning-text" style="color: #ff8888; text-align: center; font-size: 16px;">⚠️ После подтверждения роль изменить нельзя</p>
        </div>
    </div>

    <script>
        // Firebase конфиг
        const firebaseConfig = {
            apiKey: "AIzaSyA-FGoB1L-euPEfGZvTN0pyfyLGZY4zGyE",
            authDomain: "ilyaklass-b11c0.firebaseapp.com",
            projectId: "ilyaklass-b11c0",
            storageBucket: "ilyaklass-b11c0.firebasestorage.app",
            messagingSenderId: "803990572684",
            appId: "1:803990572684:web:f10f6399a2c0c035e5b5a9",
            databaseURL: "https://ilyaklass-b11c0-default-rtdb.firebaseio.com/"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const provider = new firebase.auth.GoogleAuthProvider();

        let currentUser = null;
        let userRole = null;
        let userFullName = null;
        let teacherSubjects = [];
        let selectedSubject = null;

        // Список предметов с иконками
        const subjects = [
            { name: 'Русский язык', icon: '📖' },
            { name: 'Алгебра', icon: '🔢' },
            { name: 'Геометрия', icon: '📐' },
            { name: 'Математика', icon: '🧮' },
            { name: 'Химия', icon: '🧪' },
            { name: 'Физика', icon: '⚡' },
            { name: 'Литература', icon: '📚' },
            { name: 'Английский язык', icon: '🇬🇧' },
            { name: 'История', icon: '🏛️' },
            { name: 'Физкультура', icon: '⚽' }
        ];

        // Проверка авторизации
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                
                const userRef = db.ref('users/' + user.uid);
                const snapshot = await userRef.once('value');
                const userData = snapshot.val();
                
                if (userData && userData.role) {
                    userRole = userData.role;
                    userFullName = userData.fullName || user.displayName;
                    
                    if (userRole === 'teacher' && userData.subjects) {
                        teacherSubjects = userData.subjects;
                    } else if (userRole === 'teacher') {
                        teacherSubjects = subjects.map(s => s.name);
                    }
                    
                    document.getElementById('roleModal').style.display = 'none';
                    updateUI();
                    loadContent();
                } else {
                    document.getElementById('roleModal').style.display = 'flex';
                    updateUI();
                }
            } else {
                currentUser = null;
                userRole = null;
                userFullName = null;
                teacherSubjects = [];
                updateUI();
                loadContent();
            }
        });

        function signIn() {
            auth.signInWithPopup(provider);
        }

        function signOut() {
            auth.signOut();
        }

        async function selectRole(role) {
            if (!currentUser) return;
            
            const userData = {
                email: currentUser.email,
                googleName: currentUser.displayName,
                avatar: currentUser.photoURL,
                role: role,
                fullName: currentUser.displayName,
                registeredAt: Date.now()
            };
            
            if (role === 'teacher') {
                userData.subjects = subjects.map(s => s.name);
            }
            
            await db.ref('users/' + currentUser.uid).set(userData);
            
            document.getElementById('roleModal').style.display = 'none';
            userFullName = currentUser.displayName;
            if (role === 'teacher') {
                teacherSubjects = subjects.map(s => s.name);
            }
            window.location.reload();
        }

        function updateUI() {
            const userSection = document.getElementById('userSection');
            if (!userSection) return;
            
            if (currentUser) {
                userSection.innerHTML = `
                    <div class="user-card">
                        <img src="${currentUser.photoURL}" class="avatar">
                        <span style="font-weight: 500;">${userFullName || currentUser.displayName}</span>
                        <span class="role-badge">${userRole === 'teacher' ? 'Учитель' : 'Ученик'}</span>
                        <button onclick="signOut()" class="logout-btn">Выйти</button>
                    </div>
                `;
            } else {
                userSection.innerHTML = '';
            }
        }

        function loadContent() {
            const content = document.getElementById('content');
            
            if (!currentUser) {
                content.innerHTML = `
                    <div class="login-container">
                        <div class="login-card">
                            <div class="login-title">
                                <span class="logo-il">ИЛЬ</span>
                                <span class="logo-yaclass">ЯКЛАСС</span>
                            </div>
                            <div class="login-subtitle">Войдите, чтобы продолжить</div>
                            <button class="login-big-btn" onclick="signIn()">
                                🔑 Войти через Google
                            </button>
                        </div>
                    </div>
                `;
                return;
            }

            content.innerHTML = `
                <div class="subjects-grid" id="subjectsGrid">
                    ${subjects.map(s => `
                        <div class="subject-card" onclick="selectSubject('${s.name}')" id="subject-${s.name.replace(/\s/g, '')}">
                            <div class="subject-icon">${s.icon}</div>
                            <div class="subject-name">${s.name}</div>
                            <div class="subject-count" id="count-${s.name.replace(/\s/g, '')}">0 викторин</div>
                        </div>
                    `).join('')}
                </div>

                <div class="quizzes-section" id="quizzesSection" style="display: none;">
                    <div class="section-header">
                        <h2 class="section-title" id="selectedSubjectTitle">Выберите предмет</h2>
                        ${userRole === 'teacher' ? `
                            <button class="add-quiz-btn" onclick="toggleForm()">➕ Добавить викторину</button>
                        ` : ''}
                    </div>

                    <div id="quizForm" class="quiz-form">
                        <h3 style="color: #ffd700; margin-bottom: 30px; font-size: 28px;">Новая викторина</h3>
                        
                        <div class="form-group">
                            <label>Тип викторины</label>
                            <div class="radio-group" id="quizTypeGroup">
                                <div class="radio-option selected" onclick="selectQuizType('kahoot')" id="type-kahoot">
                                    <input type="radio" name="quizType" value="kahoot" checked> 🎮 Kahoot (с учениками)
                                </div>
                                <div class="radio-option" onclick="selectQuizType('simple')" id="type-simple">
                                    <input type="radio" name="quizType" value="simple"> 📝 Простая ссылка (без учеников)
                                </div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Класс</label>
                            <select id="quizClass">
                                <option value="5">5 класс</option>
                                <option value="6">6 класс</option>
                                <option value="7">7 класс</option>
                                <option value="8">8 класс</option>
                                <option value="9">9 класс</option>
                                <option value="10">10 класс</option>
                                <option value="11">11 класс</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Предмет</label>
                            <select id="quizSubject">
                                ${subjects.map(s => `<option value="${s.name}">${s.icon} ${s.name}</option>`).join('')}
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Название викторины</label>
                            <input type="text" id="quizTitle" placeholder="Например: Conditionals, Past Simple...">
                        </div>

                        <div class="form-group">
                            <label>Описание (необязательно)</label>
                            <textarea id="quizDescription" rows="3" placeholder="Краткое описание викторины..."></textarea>
                        </div>

                        <div class="form-group">
                            <label>Ссылка</label>
                            <input type="url" id="quizLink" placeholder="https://example.com/quiz или /conditionals/teacher.html">
                            <small style="color: #aaa; display: block; margin-top: 5px;">Можно вставить любую ссылку или путь к вашей викторине на GitHub</small>
                        </div>

                        <div class="form-group" id="maxScoreGroup">
                            <label>Максимальный балл (для Kahoot)</label>
                            <input type="number" id="quizMaxScore" placeholder="15" value="15">
                        </div>

                        <button class="submit-quiz" onclick="saveQuiz()">💾 Сохранить викторину</button>
                    </div>

                    <div id="quizzesList" class="quiz-grid"></div>
                </div>

                ${userRole === 'teacher' ? `
                    <div class="my-quizzes-section">
                        <h2 class="section-title">📋 Мои проведенные викторины</h2>
                        <div id="myQuizzesList"></div>
                    </div>
                ` : `
                    <div class="my-quizzes-section">
                        <h2 class="section-title">📊 Мои результаты</h2>
                        <div id="myResults"></div>
                    </div>
                `}
            `;

            // Загружаем викторины и обновляем счетчики
            loadAllQuizzes();
            if (userRole === 'teacher') {
                loadTeacherSessions();
            } else {
                loadStudentResults();
            }
        }

        function selectSubject(subject) {
            selectedSubject = subject;
            
            // Подсвечиваем выбранный предмет
            subjects.forEach(s => {
                const el = document.getElementById(`subject-${s.name.replace(/\s/g, '')}`);
                if (el) {
                    if (s.name === subject) {
                        el.classList.add('selected');
                    } else {
                        el.classList.remove('selected');
                    }
                }
            });
            
            // Показываем секцию с викторинами
            document.getElementById('quizzesSection').style.display = 'block';
            document.getElementById('selectedSubjectTitle').innerHTML = `${subjects.find(s => s.name === subject).icon} ${subject}`;
            
            // Загружаем викторины по выбранному предмету
            loadQuizzesBySubject(subject);
        }

        function loadAllQuizzes() {
            db.ref('quizzes').on('value', (snapshot) => {
                const quizzes = snapshot.val();
                if (!quizzes) return;
                
                // Обновляем счетчики для каждого предмета
                const counts = {};
                subjects.forEach(s => counts[s.name] = 0);
                
                Object.values(quizzes).forEach(q => {
                    if (counts.hasOwnProperty(q.subject)) {
                        counts[q.subject]++;
                    }
                });
                
                subjects.forEach(s => {
                    const countEl = document.getElementById(`count-${s.name.replace(/\s/g, '')}`);
                    if (countEl) {
                        countEl.textContent = `${counts[s.name]} викторин`;
                    }
                });
                
                if (selectedSubject) {
                    loadQuizzesBySubject(selectedSubject);
                }
            });
        }

        function loadQuizzesBySubject(subject) {
            db.ref('quizzes').orderByChild('subject').equalTo(subject).on('value', (snapshot) => {
                const quizzes = snapshot.val();
                const container = document.getElementById('quizzesList');
                if (!container) return;
                
                if (!quizzes) {
                    container.innerHTML = '<p style="text-align: center; color: #aaa; padding: 40px;">В этом предмете пока нет викторин</p>';
                    return;
                }

                let html = '';
                Object.keys(quizzes).forEach(key => {
                    const q = quizzes[key];
                    
                    // Для учеников показываем только активные Kahoot викторины
                    if (userRole === 'student' && q.type === 'kahoot') {
                        // Проверяем, есть ли активная сессия
                        db.ref('sessions').orderByChild('quizId').equalTo(key).once('value', (sessionsSnap) => {
                            const sessions = sessionsSnap.val();
                            let isActive = false;
                            if (sessions) {
                                Object.values(sessions).forEach(s => {
                                    if (s.status === 'active') isActive = true;
                                });
                            }
                            if (!isActive) return;
                        });
                    }
                    
                    html += `
                        <div class="quiz-card">
                            <span class="quiz-badge ${q.type === 'kahoot' ? 'badge-kahoot' : 'badge-simple'}">
                                ${q.type === 'kahoot' ? '🎮 Kahoot' : '📝 Простая'}
                            </span>
                            <div class="quiz-class">${q.class} класс</div>
                            <div class="quiz-title">${q.title}</div>
                            <div class="quiz-subject">${q.subject}</div>
                            ${q.description ? `<p style="color: #aaa; margin-bottom: 15px;">${q.description}</p>` : ''}
                            <div class="quiz-link">🔗 ${q.link}</div>
                            ${q.type === 'kahoot' ? `<div style="color: #ffd700; margin: 10px 0;">Макс. балл: ${q.maxScore}</div>` : ''}
                            
                            <div class="quiz-actions">
                                ${userRole === 'teacher' ? `
                                    ${q.type === 'kahoot' ? 
                                        `<button class="btn btn-teacher" onclick="startQuiz('${key}', '${q.link}', '${q.subject}', '${q.title}', ${q.maxScore})">▶️ Запустить</button>` :
                                        `<a href="${q.link}" target="_blank" class="btn btn-external">🌐 Перейти</a>`
                                    }
                                    <button class="btn btn-external" onclick="removeFromMain('${key}')">❌ Убрать</button>
                                ` : `
                                    ${q.type === 'kahoot' ? 
                                        `<button class="btn btn-student" onclick="joinQuiz('${key}', '${q.link}', '${q.subject}', '${q.title}', ${q.maxScore})">🎮 Играть</button>` :
                                        `<a href="${q.link}" target="_blank" class="btn btn-external">🌐 Перейти</a>`
                                    }
                                `}
                            </div>
                        </div>
                    `;
                });
                
                container.innerHTML = html || '<p style="text-align: center; color: #aaa; padding: 40px;">В этом предмете пока нет викторин</p>';
            });
        }

        let quizType = 'kahoot';

        function selectQuizType(type) {
            quizType = type;
            document.getElementById('type-kahoot').classList.toggle('selected', type === 'kahoot');
            document.getElementById('type-simple').classList.toggle('selected', type === 'simple');
            
            // Показываем/скрываем поле максимального балла
            document.getElementById('maxScoreGroup').style.display = type === 'kahoot' ? 'block' : 'none';
        }

        function toggleForm() {
            document.getElementById('quizForm').classList.toggle('visible');
        }

        async function saveQuiz() {
            try {
                const type = quizType;
                const quizClass = document.getElementById('quizClass').value;
                const subject = document.getElementById('quizSubject').value;
                const title = document.getElementById('quizTitle').value;
                const description = document.getElementById('quizDescription').value;
                const link = document.getElementById('quizLink').value;
                const maxScore = type === 'kahoot' ? parseInt(document.getElementById('quizMaxScore').value) : 0;

                if (!title || !link) {
                    alert('Заполните название и ссылку');
                    return;
                }

                const quizData = {
                    type: type,
                    class: quizClass,
                    subject: subject,
                    title: title,
                    description: description,
                    link: link,
                    createdBy: currentUser.uid,
                    createdAt: Date.now()
                };

                if (type === 'kahoot') {
                    quizData.maxScore = maxScore;
                }

                await db.ref('quizzes').push(quizData);
                
                // Очищаем форму
                document.getElementById('quizTitle').value = '';
                document.getElementById('quizDescription').value = '';
                document.getElementById('quizLink').value = '';
                document.getElementById('quizMaxScore').value = '15';
                
                document.getElementById('quizForm').classList.remove('visible');
                
            } catch (error) {
                console.error('Ошибка при сохранении:', error);
                alert('Ошибка при сохранении викторины');
            }
        }

        async function removeFromMain(quizId) {
            if (confirm('Убрать викторину с главной?')) {
                await db.ref('quizzes/' + quizId).remove();
            }
        }

        // Учитель запускает Kahoot викторину
        async function startQuiz(quizId, link, subject, title, maxScore) {
            try {
                const teacherName = userFullName || currentUser.displayName || 'Учитель';
                
                // Извлекаем папку из ссылки, если это github.io
                let folder = '';
                if (link.includes('ilyasigma111.github.io')) {
                    const match = link.match(/github\.io\/([^\/]+)/);
                    if (match) folder = match[1];
                }
                
                const sessionRef = db.ref('sessions').push();
                const sessionId = sessionRef.key;
                
                const sessionData = {
                    quizId: quizId,
                    quizFolder: folder,
                    quizSubject: subject,
                    quizTitle: title,
                    maxScore: maxScore || 0,
                    teacherId: currentUser.uid,
                    teacherName: teacherName,
                    status: 'active',
                    startedAt: Date.now(),
                    students: {}
                };
                
                await sessionRef.set(sessionData);
                
                await db.ref(`teacherSessions/${currentUser.uid}/${sessionId}`).set({
                    quizSubject: subject,
                    quizTitle: title,
                    maxScore: maxScore || 0,
                    status: 'active',
                    startedAt: Date.now(),
                    students: {}
                });
                
                // Открываем ссылку
                window.open(link, '_blank');
                
            } catch (error) {
                console.error('Ошибка при запуске:', error);
                alert('Ошибка при запуске викторины');
            }
        }

        // Ученик присоединяется к Kahoot
        async function joinQuiz(quizId, link, subject, title, maxScore) {
            try {
                const studentName = userFullName || currentUser.displayName || 'Ученик';
                
                if (!studentName) {
                    alert('Ошибка: не удалось определить имя');
                    return;
                }
                
                const sessionsSnapshot = await db.ref('sessions').orderByChild('quizId').equalTo(quizId).once('value');
                const sessions = sessionsSnapshot.val();
                
                let activeSession = null;
                let activeSessionId = null;
                
                if (sessions) {
                    for (const [key, value] of Object.entries(sessions)) {
                        if (value.status === 'active') {
                            activeSession = value;
                            activeSessionId = key;
                            break;
                        }
                    }
                }
                
                if (!activeSession) {
                    alert('Сейчас нет активной викторины');
                    return;
                }
                
                await db.ref(`sessions/${activeSessionId}/students/${currentUser.uid}`).set({
                    name: studentName,
                    email: currentUser.email,
                    joinedAt: Date.now()
                });
                
                await db.ref(`teacherSessions/${activeSession.teacherId}/${activeSessionId}/students/${currentUser.uid}`).set({
                    name: studentName,
                    email: currentUser.email
                });
                
                // Добавляем параметры к ссылке
                let url = new URL(link);
                url.searchParams.append('session', activeSessionId);
                url.searchParams.append('student', currentUser.uid);
                url.searchParams.append('name', studentName);
                
                window.open(url.toString(), '_blank');
                
            } catch (error) {
                console.error('Ошибка при присоединении:', error);
                alert('Ошибка при присоединении к викторине');
            }
        }

        // Загрузка сессий учителя
        function loadTeacherSessions() {
            db.ref(`teacherSessions/${currentUser.uid}`).on('value', (snapshot) => {
                const sessions = snapshot.val();
                const container = document.getElementById('myQuizzesList');
                if (!container) return;
                
                if (!sessions) {
                    container.innerHTML = '<p style="color: #aaa; text-align: center;">Нет проведенных викторин</p>';
                    return;
                }

                let html = '';
                const sortedIds = Object.keys(sessions).sort((a, b) => {
                    return (sessions[b].startedAt || 0) - (sessions[a].startedAt || 0);
                });
                
                sortedIds.forEach(id => {
                    const s = sessions[id];
                    const date = s.startedAt ? new Date(s.startedAt).toLocaleString() : 'Дата неизвестна';
                    
                    html += `
                        <div class="session-card">
                            <div class="session-header">
                                <div>
                                    <strong style="color: #ffd700; font-size: 20px;">${s.quizSubject} - ${s.quizTitle}</strong>
                                    <div style="color: #aaa; margin-top: 5px;">${date}</div>
                                </div>
                                <span class="session-status ${s.status === 'active' ? 'status-active' : 'status-finished'}">
                                    ${s.status === 'active' ? '🟢 Активна' : '🔵 Завершена'}
                                </span>
                            </div>
                            
                            <div class="students-list" id="students-${id}">
                                ${renderStudents(s.students, s.maxScore, id, s.status)}
                            </div>
                            
                            ${s.status === 'active' ? `
                                <button class="finish-quiz-btn" onclick="finishQuiz('${id}')">
                                    🏁 Завершить викторину
                                </button>
                            ` : ''}
                            
                            ${s.status === 'finished' ? `
                                <button class="save-scores-btn" onclick="saveScores('${id}')">
                                    💾 Сохранить результаты
                                </button>
                            ` : ''}
                        </div>
                    `;
                });
                container.innerHTML = html;
            });
        }

        function renderStudents(students, maxScore, sessionId, status) {
            if (!students || Object.keys(students).length === 0) {
                return '<p style="color: #aaa;">Пока нет учеников</p>';
            }
            
            let html = '';
            Object.keys(students).forEach(id => {
                const student = students[id];
                html += `
                    <div class="student-item">
                        <span style="font-weight: 500;">${student.name || 'Без имени'}</span>
                        ${status === 'finished' ? 
                            `<input type="number" class="score-input" id="score-${sessionId}-${id}" 
                                    max="${maxScore || 100}" min="0" 
                                    placeholder="0-${maxScore || 100}">` :
                            '<span style="color: #10b981;">✓ Присоединился</span>'
                        }
                    </div>
                `;
            });
            return html;
        }

        async function finishQuiz(sessionId) {
            try {
                await db.ref(`sessions/${sessionId}`).update({ status: 'finished' });
                await db.ref(`teacherSessions/${currentUser.uid}/${sessionId}`).update({ status: 'finished' });
            } catch (error) {
                console.error('Ошибка при завершении:', error);
                alert('Ошибка при завершении викторины');
            }
        }

        async function saveScores(sessionId) {
            try {
                const sessionSnap = await db.ref(`sessions/${sessionId}`).once('value');
                const session = sessionSnap.val();
                
                if (!session || !session.students) {
                    alert('Нет учеников в этой викторине');
                    return;
                }
                
                let count = 0;
                for (const studentId of Object.keys(session.students)) {
                    const input = document.getElementById(`score-${sessionId}-${studentId}`);
                    if (!input) continue;
                    
                    const score = parseInt(input.value);
                    if (isNaN(score)) continue;
                    
                    await db.ref('results').push({
                        studentId: studentId,
                        studentName: session.students[studentId].name || 'Без имени',
                        quizSubject: session.quizSubject || 'Без названия',
                        quizTitle: session.quizTitle || 'Без темы',
                        score: score,
                        maxScore: session.maxScore || 0,
                        teacherId: currentUser.uid,
                        date: Date.now()
                    });
                    count++;
                }
                
                alert(`✅ Сохранено ${count} результатов!`);
                
            } catch (error) {
                console.error('Ошибка при сохранении:', error);
                alert('Ошибка при сохранении результатов');
            }
        }

        // Результаты ученика
        function loadStudentResults() {
            db.ref('results').orderByChild('studentId').equalTo(currentUser.uid).on('value', (snapshot) => {
                const results = snapshot.val();
                const container = document.getElementById('myResults');
                if (!container) return;
                
                if (!results) {
                    container.innerHTML = '<p style="color: #aaa; text-align: center;">У вас пока нет результатов</p>';
                    return;
                }

                let html = '<div class="students-list">';
                const sortedIds = Object.keys(results).sort((a, b) => {
                    return (results[b].date || 0) - (results[a].date || 0);
                });
                
                sortedIds.forEach(key => {
                    const r = results[key];
                    const date = r.date ? new Date(r.date).toLocaleString() : 'Дата неизвестна';
                    
                    html += `
                        <div class="student-item">
                            <div>
                                <strong style="color: #ffd700;">${r.quizSubject} - ${r.quizTitle}</strong>
                                <div style="color: #aaa; font-size: 14px;">${date}</div>
                            </div>
                            <span class="score-badge">${r.score || 0}/${r.maxScore || 0}</span>
                        </div>
                    `;
                });
                html += '</div>';
                container.innerHTML = html;
            });
        }
    </script>
</body>
</html>
